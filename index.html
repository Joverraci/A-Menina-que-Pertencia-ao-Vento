<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Menina que Pertencia ao Vento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #0a0a0a;
  --dark: #111111;
  --surface: #161616;
  --border: #2a2a2a;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: #7a6030;
  --white: #f5f0e8;
  --white-dim: #a89880;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'EB Garamond', Georgia, serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-body);
  font-size: 18px;
  line-height: 1.9;
  overflow-x: hidden;
}

/* ======= SCREENS ======= */
.screen {
  display: none;
  min-height: 100vh;
}
.screen.active { display: flex; }

/* ======= COVER / SPLASH ======= */
#screen-cover {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: var(--black);
  text-align: center;
  padding: 2rem;
}

.stars-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.cover-inner {
  position: relative;
  z-index: 2;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 1.8s ease, transform 1.8s ease;
  max-width: 600px;
}
.cover-inner.visible {
  opacity: 1;
  transform: translateY(0);
}

.cover-subtitle {
  font-family: var(--font-display);
  font-size: 0.85rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 2.5rem;
}

.cover-title {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 8vw, 5rem);
  font-weight: 300;
  line-height: 1.15;
  color: var(--white);
  margin-bottom: 0.4rem;
  letter-spacing: 0.01em;
}

.cover-title span {
  display: block;
  color: var(--gold);
  font-style: italic;
  font-size: 0.7em;
}

.cover-ornament {
  color: var(--gold-dim);
  font-size: 1.4rem;
  letter-spacing: 0.5em;
  margin: 2.5rem auto;
  opacity: 0.6;
}

.cover-tagline {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.1rem;
  color: var(--white-dim);
  line-height: 1.7;
  margin-bottom: 3.5rem;
}

.btn-primary {
  display: inline-block;
  padding: 0.9rem 3rem;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: var(--font-display);
  font-size: 0.9rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  background: transparent;
  transition: background 0.3s, color 0.3s;
  text-decoration: none;
}
.btn-primary:hover {
  background: var(--gold);
  color: var(--black);
}

/* ======= INDEX ======= */
#screen-index {
  flex-direction: column;
  align-items: center;
  padding: 5rem 2rem;
  background: var(--dark);
}

.index-header {
  text-align: center;
  margin-bottom: 4rem;
  max-width: 500px;
}

.index-header h2 {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 300;
  color: var(--white);
  margin-bottom: 0.5rem;
}

.index-header p {
  font-family: var(--font-display);
  font-style: italic;
  color: var(--white-dim);
  font-size: 1rem;
}

.index-nav {
  display: flex;
  gap: 1rem;
  margin-bottom: 3rem;
}

.tab-btn {
  padding: 0.5rem 1.5rem;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--white-dim);
  font-family: var(--font-display);
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn.active, .tab-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.chapters-list {
  width: 100%;
  max-width: 680px;
}

.chapter-item {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  padding: 1.1rem 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  color: inherit;
}
.chapter-item:hover { padding-left: 0.5rem; }
.chapter-item:hover .ch-title { color: var(--gold); }

.ch-num {
  font-family: var(--font-display);
  font-size: 0.75rem;
  color: var(--gold-dim);
  letter-spacing: 0.15em;
  min-width: 2.5rem;
  text-align: right;
}

.ch-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--white);
  transition: color 0.2s;
  flex: 1;
}

.ch-badge {
  font-size: 0.7rem;
  color: var(--gold);
  letter-spacing: 0.1em;
}

/* Gallery tab */
.gallery-tab {
  display: none;
  width: 100%;
  max-width: 680px;
}
.gallery-tab.active { display: block; }
.chapters-list.hidden { display: none; }

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.5rem;
  margin-top: 1rem;
}

.gallery-photo {
  cursor: pointer;
  overflow: hidden;
  border: 1px solid var(--border);
  transition: border-color 0.2s, transform 0.2s;
}
.gallery-photo:hover { border-color: var(--gold); transform: scale(1.01); }
.gallery-photo img { width: 100%; display: block; }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 999;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 100%;
  max-height: 90vh;
  object-fit: contain;
}
.lightbox-close {
  position: absolute;
  top: 1.5rem;
  right: 2rem;
  color: var(--white-dim);
  font-size: 2rem;
  cursor: pointer;
  background: none;
  border: none;
  line-height: 1;
}

/* ======= READER ======= */
#screen-reader {
  flex-direction: column;
  min-height: 100vh;
  background: var(--black);
}

.reader-topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid var(--border);
  padding: 0.9rem 2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.topbar-back {
  background: none;
  border: none;
  color: var(--white-dim);
  font-family: var(--font-display);
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  transition: color 0.2s;
}
.topbar-back:hover { color: var(--gold); }

.topbar-title {
  flex: 1;
  text-align: center;
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-style: italic;
  color: var(--white-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.progress-bar-wrap {
  position: sticky;
  top: 49px;
  z-index: 9;
  height: 2px;
  background: var(--border);
}
.progress-bar-fill {
  height: 100%;
  background: var(--gold);
  transition: width 0.1s;
  width: 0%;
}

.reader-content {
  flex: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 4rem 2rem 6rem;
  width: 100%;
}

.chapter-heading {
  text-align: center;
  margin-bottom: 3.5rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}

.chapter-eyebrow {
  font-family: var(--font-display);
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 1rem;
}

.chapter-heading h1 {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 300;
  line-height: 1.25;
  color: var(--white);
}

.reader-body {
  font-size: clamp(1rem, 2.5vw, 1.15rem);
  line-height: 2;
  color: var(--white);
}

.reader-body p {
  margin-bottom: 1.5em;
  text-indent: 2em;
  font-family: var(--font-body);
}

.reader-body p:first-child,
.reader-body p.no-indent {
  text-indent: 0;
}

.reader-body .dialogue {
  text-indent: 0;
  margin-left: 0;
}

.reader-body .section-break {
  text-align: center;
  color: var(--gold-dim);
  letter-spacing: 0.4em;
  margin: 2.5em 0;
  font-size: 0.85rem;
}

.reader-footer {
  max-width: 720px;
  margin: 0 auto;
  padding: 2rem 2rem 5rem;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border);
  gap: 1rem;
}

.nav-btn {
  padding: 0.7rem 1.8rem;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--white-dim);
  font-family: var(--font-display);
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-btn:hover { border-color: var(--gold); color: var(--gold); }
.nav-btn:disabled { opacity: 0.2; cursor: default; }

.nav-center {
  text-align: center;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--gold-dim);
}

/* ======= ANIMATION UTILS ======= */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in {
  animation: fadeIn 0.7s ease forwards;
}

/* ======= MOBILE ======= */
@media (max-width: 640px) {
  .reader-content { padding: 2.5rem 1.2rem 5rem; }
  .reader-topbar { padding: 0.8rem 1rem; }
  .reader-footer { padding: 1.5rem 1rem 4rem; flex-wrap: wrap; justify-content: center; }
  .nav-center { width: 100%; order: -1; }
  .index-nav { flex-wrap: wrap; justify-content: center; }
  body { font-size: 16px; }
}

@media (prefers-reduced-motion: reduce) {
  *, .fade-in, .cover-inner { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>

<!-- COVER -->
<div id="screen-cover" class="screen active">
  <canvas class="stars-canvas" id="stars-canvas"></canvas>
  <div class="cover-inner" id="cover-inner">
    <p class="cover-subtitle">Uma história escrita com o coração</p>
    <h1 class="cover-title">A Menina que<span>Pertencia ao Vento</span></h1>
    <div class="cover-ornament">— ✦ —</div>
    <p class="cover-tagline">
      Escrito por alguém que encontrou,<br>
      em você, a sua história favorita.
    </p>
    <button class="btn-primary" onclick="goToIndex()">Abrir o Livro</button>
  </div>
</div>

<!-- INDEX -->
<div id="screen-index" class="screen">
  <div class="index-header">
    <h2>A Menina que Pertencia ao Vento</h2>
    <p>João Pedro Hessel Verraci Menezes</p>
  </div>

  <div class="index-nav">
    <button class="tab-btn active" onclick="showTab('chapters', this)">Capítulos</button>
    <button class="tab-btn" onclick="showTab('gallery', this)">Nossa Galeria ❤</button>
  </div>

  <div class="chapters-list" id="tab-chapters"></div>

  <div class="gallery-tab" id="tab-gallery">
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</div>

<!-- READER -->
<div id="screen-reader" class="screen">
  <div class="reader-topbar">
    <button class="topbar-back" onclick="goToIndex()">← Índice</button>
    <div class="topbar-title" id="reader-topbar-title">A Menina que Pertencia ao Vento</div>
    <div style="min-width:60px"></div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
  <div class="reader-content">
    <div class="chapter-heading">
      <p class="chapter-eyebrow" id="chapter-eyebrow"></p>
      <h1 id="chapter-title"></h1>
    </div>
    <div class="reader-body" id="reader-body"></div>
  </div>
  <div class="reader-footer">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← Anterior</button>
    <div class="nav-center" id="nav-center"></div>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">Próximo →</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ==================== DATA ====================
const CHAPTERS = [{"id": "dedicatoria", "title": "Dedicatória", "text": "Dedicatória\nPara a menina que pertencia ao vento.\nA menina que saiu de casa para descobrir até onde\nconseguiria chegar sozinha.\nQue aprendeu a amar estradas, cavalos, manhãs no interior e\nhorizontes sem fim.\nQue carrega nos olhos a calma de quem sabe para onde quer\nir, mesmo quando ainda não conhece o caminho.\nQue tem princípios tão firmes quanto as raízes das árvores\nmais antigas.\nQue confia devagar.\nMas quando confia, entrega algo que não pode ser medido.\nQue é mais forte do que imagina.\nMais bonita do que percebe.\nE mais especial do que provavelmente acredita.\nEste livro não foi escrito porque eu precisava contar uma\nhistória.\nEle foi escrito porque, depois que você apareceu, algumas\ncoisas deixaram de caber apenas dentro de mim.\nAs conversas.\nAs risadas.\n\nOs silêncios.\nA forma como você enxerga o mundo.\nA forma como você me fez enxergar o mundo.\nEntão transformei tudo isso em páginas.\nNa esperança de que, em algum momento da leitura, você\nencontre um pedaço de si mesma aqui.\nE que, quando isso acontecer, também encontre um pedaço\nde como eu te vejo.\nPorque essa sempre foi a parte mais importante.\nNão a história, você."}, {"id": "epigrafe", "title": "Epígrafe", "text": "Epígrafe\n\"Eu vou chegar até o fim da minha vida sem olhar para trás\ne pensar 'eu deveria ter tentado'.\" — Serena\n\nConvergência: o que acontece quando dois elementos com\nafinidade natural existem no mesmo espaço por tempo\nsuficiente. Não é destino. É física. É escolha. — Caderno de\nMagia Natural, terceiro ano, Academia Valdris"}, {"id": "prefacio", "title": "Prefácio do Autor", "text": "Prefácio do Autor\nExiste uma pergunta que guiou cada página deste livro:\nComo alguém que ama essa garota enxergaria o mundo\ndela?\nNão é uma pergunta fácil de responder. Não porque faltem\npalavras — mas porque algumas pessoas são mais difíceis de\ndescrever do que parecem, não pela complexidade óbvia, mas\npela complexidade quieta. A que existe em silêncios cheios\ndemais para caber em frases. A que mora entre o que uma\npessoa diz e o que ela guarda. A que só aparece para quem\npresta atenção do tipo certo, durante tempo suficiente.\nEste livro é uma tentativa de responder essa pergunta.\nA protagonista desta história — Serena — não é baseada em\nnenhuma personagem de ficção que eu conheça. É inspirada\nem alguém real. Em alguém que cresceu entre o barro e o\nasfalto e carregou os dois dentro de si sem precisar escolher.\nQue veio de longe por escolha, não por acidente. Que tem\numa frase que é bússola e que vive essa frase de verdade, não\ncomo slogan, mas como forma de existir no mundo.\nQue é, fundamentalmente, a pessoa mais difícil e mais valiosa\nde conhecer que já encontrei.\nEscrevi sobre uma academia de magia porque algumas\nhistórias precisam de um mundo maior do que o real para\ncaber. Não porque a história seja fantástica — mas porque o\nque existe entre duas pessoas que se encontram de verdade é\nsempre um pouco maior do que o espaço físico que ocupam.\nHá algo de mágico nisso que merecia um cenário à altura.\n\nOs elementos fantásticos são apenas metáforas com forma. O\nque eles representam é simples: que o mundo presta atenção.\nQue algumas coisas ficam por razões que a ciência não\nexplica completamente.\nEsse livro não é o fim.\nÉ o começo."}, {"id": "cap1", "title": "A Menina que Pertencia ao Vento", "text": "A Menina que Pertencia ao Vento\nExiste um tipo específico de solidão que ninguém te avisa que\nvem com a distância.\nNão é a solidão de estar sozinha num quarto. Não é a ausência\nde gente — porque gente nunca falta, numa academia com\nmais de trezentos estudantes morando uns em cima dos outros\nnum castelo velho que range toda vez que o vento bate. É\noutra coisa. É a solidão de estar rodeada de pessoas que ainda\nnão te conhecem de verdade, num lugar que ainda não tem o\nseu cheiro, olhando pela janela pra uma paisagem que é linda\nmas que não é sua.\nEu vim de longe pra estudar aqui.\nNem todo mundo entende por quê. Minha cidade tinha uma\nescola de magia — pequena, sim, com professores cansados\ne corredores que cheiravam a livro mofado, mas tinha. Não\nprecisava ter ido tão longe. Mas eu fui. Porque havia algo em\nmim que sempre soube que ficar perto de tudo que eu amava\nera o caminho mais curto para nunca descobrir o que eu era\ncapaz de fazer sozinha.\nE eu precisava saber.\n●\nMeu nome é Serena.\nSerena do que não importa agora — sobrenomes são para\ndocumentos e para mães chamando filho pelo nome completo\nquando alguma coisa quebrou. O que importa é que eu tenho\nvinte e um anos, estou no terceiro ano da Academia Valdris\n\nde Artes Mágicas, e acordo todo dia numa cama que não é a\nminha sentindo o cheiro errado no ar.\nO cheiro certo fica a muitas horas daqui.\nFica numa fazenda que tem nome, que tem história, que tem\na terra de uma cor específica de vermelho que eu nunca vi em\nnenhum outro lugar do mundo. Fica no pêlo quente do Trovão\n— meu cavalo, malhado, absolutamente teimoso, que me\nensinou mais sobre liberdade do que qualquer feitiço já\nconseguiu. Fica no som que o portão de madeira faz quando\nvocê o empurra e ele range do jeito certo, do jeito familiar, do\njeito que diz você está em casa.\nAqui o portão não range. Aqui o portão é de ferro e se abre\nsozinho com uma runa e não diz absolutamente nada.\nMas eu vim assim mesmo.\nE faria de novo.\n●\nA Valdris é impressionante do jeito que lugares antigos são\nimpressionantes — com uma grandiosidade que intimida\nantes de acolher. Torres que somem nas nuvens em dias de\nchuva. Corredores que às vezes mudam de lugar quando você\nnão está prestando atenção. Uma biblioteca com quatro\nandares subterrâneos que ninguém nunca visitou\ncompletamente porque o quarto andar costuma mover as\nprateleiras quando sente que está sendo explorado com pressa\ndemais.\nEu amei a biblioteca desde o primeiro dia.\n\nNão pelo mistério — embora o mistério ajude. Amei porque\nsilêncio de biblioteca é um tipo de silêncio que eu reconheço.\nÉ parecido com o silêncio de fazenda às cinco da manhã,\nquando o mundo ainda não acordou completamente e você\npode existir por alguns minutos sem que ninguém precise de\nnada de você.\nEu sou muito melhor em silêncios do que em conversas. Mas\nestou buscando mudar isso.\nIsso foi a primeira coisa que a Valdris descobriu sobre mim.\n●\nSou morena, cabelos escuros, olhos que minha mãe sempre\nchamou de \"castanhos com decisão própria\" — não sei\nexatamente o que isso significa, mas parece certo. Tenho 1,69\nde altura, o que na prática significa que eu me curvo um\npouco mais do que devia pra não parecer que estou\nintimidando ninguém quando entro num cômodo (só que\nnão), e ao mesmo tempo sinto que preciso me curvar pro\nmundo inteiro quando estou nervosa e tento parecer menor.\nNão sou alguém que chama atenção de propósito.\nMas por alguma razão, às vezes chamo.\nIsso nunca deixou de me surpreender.\nSou tímida. E quando digo tímida não estou sendo modesta\n— é um fato concreto, operacional, como dizer que tenho\ncabelo escuro ou que prefiro a cor preta em praticamente tudo\nque uso. A timidez não é delicada em mim. Não é o tipo que\nfaz uma pessoa parecer etérea e misteriosa. É a timidez que\ntrava a garganta exatamente quando mais importa falar. Que\n\nfaz os meus silêncios parecerem frios quando são, na verdade,\napenas cheios demais pra caber em palavras naquele\nmomento.\nA maioria das pessoas interpreta silêncio como desinteresse.\nAlgumas poucas entendem que é o contrário.\n●\nEscolhi a Valdris por causa do programa de Magia Natural —\na especialização que trabalha com feitiços que emergem de\ncoisas vivas, de terra, de vento, de água corrente. É a área\nmais antiga e menos glamourosa da magia contemporânea.\nEnquanto todo mundo corre pra Transmutação Avançada e\nManipulação Elemental, que são as especializações que\naparecem nos rankings e nos torneios televisionados, a Magia\nNatural fica nos corredores mais tranquilos com os\nprofessores mais velhos e os estudantes que preferem sujar as\nmãos a impressionar uma plateia.\nEu me encaixei imediatamente.\nNão sou de plateia. Nunca fui.\nSou de trabalho quieto, de resultado que leva tempo, de\nsementes que você planta sem saber exatamente quando vão\nvirar árvore.\nCresci num lugar onde o tempo funciona diferente. Onde\nvocê aprende que algumas coisas não têm pressa porque a\npressa estraga. A terra não aceita pressa. O cavalo não aceita\npressa. A confiança não aceita pressa.\nTalvez por isso eu também não aceite.\n\n•\nExiste uma frase que eu carrego comigo desde que me\nentendo por gente. Não sei de onde veio exatamente — talvez\ndo meu pai, que construiu tudo que tem com as próprias mãos\ne com uma teimosia que reconheço em mim como reconheço\no meu próprio reflexo. Talvez seja apenas uma coisa que\nnasceu dentro de mim num dia qualquer e ficou.\nMas ela está lá, firme como estaca em chão seco:\nEu vou chegar até o fim da minha vida sem olhar para trás e\npensar \"eu deveria ter tentado\".\nFoi essa frase que me trouxe pra Valdris.\nFoi essa frase que me fez pegar uma mochila, me despedir da\nfazenda, abraçar o Trovão por muito tempo, deixar minha\nmãe me abraçar por mais tempo ainda, e entrar num trem que\nme levou mais longe de casa do que eu havia ido até então.\nNão me arrependi.\nMas não vou mentir: nos primeiros meses, houve noites em\nque eu ficava acordada até tarde — costume antigo,\nimpossível de abandonar, eu sempre fui da madrugada —\nolhando pro teto de pedra do meu quarto e sentindo o peso da\ndistância de um jeito que não tinha nome.\nNão era arrependimento.\nEra saudade.\nE saudade, aprendi, é diferente de erro.\n●\n\nA Valdris tem uma Sociedade Atlética — um grupo de\nestudantes que organiza os torneios esportivos\ninteracadêmicos, as festas, os eventos que mantêm a sanidade\ncoletiva de trezentas pessoas que passam os dias estudando\ncoisas que podem literalmente explodir se erradas.\nEu entrei como tesoureira no segundo ano.\nNão porque sou extrovertida — claramente não sou. Mas sou\norganizada, confiável, e tinha a sensação de que precisava\npertencer a alguma coisa maior que o meu próprio quarto e a\nbiblioteca do quarto andar.\nA Sociedade Atlética tem um brasão com uma vespa.\nEu sei que isso parece um detalhe sem importância.\nVai fazer sentido depois.\n●\nFoi mais ou menos nessa época que comecei a notar ele.\nNão de propósito. Nunca de propósito. Esse é o tipo de coisa\nque acontece antes que você perceba — como quando você\ncomeça a ouvir uma música sem querer e de repente está\ncantando sem ter escolhido aprender a letra.\nEle estava em vários lugares ao mesmo tempo, no sentido de\nque onde quer que eu fosse ele já estava ou acabava de chegar.\nNos torneios, nos corredores, nas aulas abertas, nos eventos\nda Sociedade. Tinha uma energia nele que ocupava espaço\nsem pedir licença — não do jeito que irrita, mas do jeito que\nfaz um lugar parecer mais vivo.\nA risada dele chegava antes dele.\n\nEu notei isso primeiro.\nDepois notei o resto.\nE então aprendi a notar sem demonstrar que estava notando\n— técnica que levo anos aperfeiçoando, e que funciona\nrazoavelmente bem com todo mundo exceto com a Lisa, que\né a minha melhor amiga e que foi colocada nesse mundo\nespecificamente para me impedir de fingir que estou bem\nquando não estou e de fingir que não me importo quando me\nimporto.\nMas isso também é história pra depois.\n●\nO que eu sei é que eu vim de longe.\nTrouxe a fazenda dentro de mim — no jeito que eu ando, no\njeito que eu prefiro o silêncio ao barulho desnecessário, no\njeito que eu desconfio antes de confiar e confio pra sempre\ndepois que confio.\nTrouxe o Trovão dentro de mim — a teimosia, a liberdade, a\nrecusa de ser domada por qualquer coisa que não valha a pena\nser domada.\nE trouxe aquela frase, que é a minha bússola, a minha âncora,\no meu norte:\nEu não vou me arrepender de não ter tentado.\nO que eu não sabia ainda é que tentativa mais difícil que me\nesperava não era nenhum feitiço.\nNão era nenhuma prova.\n\nNão era nem a distância de casa.\nEra deixar alguém entrar."}, {"id": "cap2", "title": "O rapaz que observava de longe", "text": "O rapaz que observava de longe\nPreciso ser honesta sobre uma coisa:\nEu notei ele antes de admitir para mim mesma que havia\nnotado.\nÉ que tem pessoas que existem num cômodo de uma forma\nque ocupa espaço sem pedir licença. Ele era assim. Não era\nbarulhento no jeito que irrita — era o tipo de presença que faz\num lugar parecer mais habitado. A risada que chega antes da\npessoa. A energia que você sente antes mesmo de virar e ver\nde quem é.\nEu o observava da mesma forma que observo tudo que me\ninteressa e não quero que saibam que me interessa.\nTécnica aperfeiçoada ao longo de anos.\nFunciona muito bem.\n●\nSeu nome é Ian.\nMas antes de ser Ian, ele foi, por um breve e hilário período\nda nossa história, Jovelino — e esse nome vai precisar de\ncontexto que eu não vou dar agora, porque algumas piadas só\ntêm graça quando você entende de onde vieram. O que posso\ndizer é que surgiu numa noite de brincadeira, pegou de um\njeito que não deveria ter pegado, e agora existe entre a gente\ncomo uma dessas coisas que só fazem sentido pra duas\npessoas específicas no mundo inteiro.\n\nDaquelas que se você tentar explicar pra qualquer outra\npessoa, ela vai sorrir educadamente sem entender nada.\nIan estava dois anos mais avançado que eu. Quinto ano\nquando eu entrei no primeiro, sétimo agora que estou no\nterceiro. Especializando em Magia de Movimento — que é\nexatamente o que parece, e é exatamente o motivo pelo qual\nele era atleta, velozes nos torneios de combate e ainda mais\nvelozes em tudo que precisasse de presença física. Jogava em\npelo menos três times diferentes da Sociedade Atlética, o que\neu descobri com o tempo que era menos sobre talento natural\ne mais sobre aquela incapacidade específica dele de ficar\nparado quando poderia estar em movimento.\nInquietude produtiva. Reconheci isso nele cedo. É uma\ncaracterística que, estranhamente, me acalmava — talvez\nporque eu seja o oposto: toda a minha agitação é interna,\ninvisível, acontece em silêncio dentro de mim enquanto por\nfora eu pareço absurdamente tranquila.\nNós somos as duas faces de uma mesma moeda, eu e ele.\n●\nA primeira vez que ele tentou falar comigo de verdade foi\nnum corredor depois de uma reunião da Sociedade.\nEu estava com a cabeça cheia de números — o orçamento do\ntorneio de primavera não fechava, e eu tinha a teoria de que\nalguém havia confundido galeões com grãos de sal de vez de\nnovo, o que já tinha acontecido uma vez antes e tinha\nresultado num mal-entendido com as cozinhas que não vou\ndetalhar agora. Ponto é: eu estava distraída, caminhando\nrápido, e ele surgiu no meu caminho com aquele sorriso que\neu já havia catalogado mentalmente como arma padrão —\n\nnão porque fosse falso, mas porque era automático, do jeito\nque os sorrisos de pessoas acostumadas a serem bem\nrecebidas pelo mundo sempre são.\n— Serena, né? — ele disse. Como se não soubesse. Como se\nnão tivéssemos estado na mesma reunião nos últimos\nquarenta minutos.\n— Hm — eu disse.\nIsso foi tudo.\nHm.\nEle tentou mais alguma coisa. Não me lembro exatamente\nporque meu cérebro estava simultaneamente tentando fazer\nduas contas e processar o fato de que ele estava perto demais\ne cheirava a algo que não era nenhum feitiço que eu\nconhecesse, que era, portanto, simplesmente ele.\nRespondi com o mínimo necessário para ser educada.\nE continuei andando.\nA gente é tão idiota quando está com medo.\n●\nOs meses que se seguiram foram uma série de cruzamentos\nsem consequência.\nEle sempre estava na biblioteca quando eu chegava. Eu\nsempre estava no refeitório quando ele saía. Nossas mesas\nvizinhas no torneio de verão. Nossos nomes um do lado do\noutro numa lista de voluntários pra um evento que nenhum\ndos dois havia se inscrito voluntariamente de verdade.\n\nE havia a rede social da academia — o mural digital\ncompartilhado com o MagicPad de todos os alunos, onde a\ngente postava atualizações sobre a vida, os estudos, as\npequeníssimas aventuras de morar num castelo que às vezes\ntinha opiniões próprias sobre a temperatura dos corredores.\nEle curtia tudo que eu postava.\nTudo.\nEu postava às duas da manhã — porque eu tenho o péssimo\nhábito de trocar o dia pela noite, costume que trouxe da\nfazenda onde a vida começa antes do sol nascer e,\nironicamente, nunca termina quando ele se põe — e em\nmenos de cinco minutos vinha a notificação.\nEu ficava olhando para o nome dele na tela com uma\nexpressão que eu esperava ser casual, caso alguém estivesse\nolhando por cima do meu ombro.\nCerta noite a Lisa estava comigo.\n— Esse aqui aparece sempre — ela disse, apontando pro\nnome com a precisão de quem está identificando uma espécie\nrara em campo.\n— Ele curte tudo de todo mundo — respondi, com uma\nindiferença que soube imediatamente que não estava\nconvencendo ninguém no raio de dez metros.\nA Lisa me olhou com aquele olhar que ela tem. O olhar que\ndiz eu sei exatamente o que está acontecendo e vou fingir que\nacredito em você porque é mais divertido assim.\n— Claro — ela disse."}, {"id": "cap3", "title": "Uma mensagem depois da meia-noite", "text": "Uma mensagem depois da meia-noite\nA coisa sobre acordar às duas da manhã é que o castelo fica\ndiferente.\nNão de um jeito assustador — pelo menos não sempre. De\num jeito mais honesto. Os corredores param de fingir que são\napenas corredores e assumem o que são: passagens entre\nlugares que guardam segredos, com pedras que rangem onde\nnão deveriam e tochas que acendem antes de você chegar,\ncomo se o castelo quisesse ser útil mas não soubesse muito\nbem como.\nEu gostava da Valdris de madrugada.\nEra o único horário em que ela parecia minha de verdade.\n●\nTinha sido uma terça péssima.\nA prova de Botânica Mágica havia me devolvido com uma\nnota que eu preferia não mencionar, a professora Vael tinha\nme olhado com aquela expressão de você é capaz de mais que\né simultaneamente o maior elogio e a maior pressão que uma\nprofessora pode aplicar numa aluna, e o orçamento do torneio\nde primavera da Sociedade Atlética ainda não fechava porque\no Davi — o diretor esportivo, muito confiante para a\nquantidade de erros que cometia — havia misturado as\ncolunas da planilha de um jeito que eu não conseguia desfazer\nsem refazer tudo do zero.\nEntão lá estava eu, no meu quarto, às duas e dezesseis da\nmanhã, com uma xícara de chá esfriando na minha mesa, o\n\ncobertor de onça até o queixo, olhando pro teto de pedra que\nnão tinha resposta nenhuma pra me dar.\nEventualmente peguei o MagicPad.\nPostei a foto da janela — o roxo do céu de Valdris naquele\nhorário, a pedra escura do parapeito, a névoa baixa que subia\ndas torres do andar de baixo. Era bonito de um jeito que eu\nnão conseguia explicar direito, e às vezes você posta uma\ncoisa não porque quer que alguém veja, mas porque quer\nfazer existir de um jeito que não seja só dentro de você.\nA notificação veio em dois minutos e vinte e três segundos.\nEu sei o tempo exato porque fiquei olhando pro relógio com\numa atenção que, em retrospecto, era profundamente\nreveladora.\nO nome era dele.\n●\nFiquei olhando pra notificação por um tempo que não vou\nespecificar.\nDepois olhei pro teto.\nDepois pro MagicPad de novo.\nDepois tomei um gole do chá que já estava completamente\nfrio.\nE então, antes que o bom senso — que sabidamente dorme\nantes de mim — pudesse interferir, abri a conversa e digitei:\n\"Vai ficar só na curtida?\"\n\nMandei.\nFechei o aplicativo.\nFiquei parada.\nMeu coração estava fazendo alguma coisa que eu decidi\ninterpretar como efeito colateral do chá errado.\nReabri.\nLido.\nE então veio a resposta:\n\"Depois dessa mensagem, acho difícil ficar só na curtida.\"\nEu li três vezes.\nDepois ri — o tipo de risada pequena, involuntária, que sai\nantes que você decida se quer rir. A risada que escapa quando\nalgo te pega de surpresa de um jeito bom.\nRespondi alguma coisa. Ele respondeu de volta. Eu respondi\nde novo.\nNão foi uma conversa longa. Nenhum de nós dois era bom\nnisso — eu por timidez, ele por um motivo que só entenderia\nmuito depois. Mas foi uma conversa real. Com ritmo. Com\naquele tipo de leveza que aparece quando duas pessoas\ndescobrem ao mesmo tempo que a outra é engraçada de um\njeito parecido.\nEm determinado momento ele me perguntou do que eu estava\nacordada.\n\n\"Planilha do torneio,\" eu escrevi. \"O Davi misturou tudo de\nnovo.\"\n\"O Davi mistura tudo sempre. Ele misturou os ingredientes\ndo feitiço de camuflagem semestre passado e ficou invisível\npor três dias sem conseguir desfazer.\"\n\"Isso é verdade?\"\n\"Juro pela biblioteca do quarto andar.\"\n\"Ninguém jura pela biblioteca do quarto andar.\"\n\"Exatamente.\"\nMais uma risada involuntária. Dessa vez eu não tentei contêla.\nA conversa morreu naturalmente, como todas as conversas\nmorrem quando já passa das três da manhã e os dois lados\nreconhecem que precisam dormir.\n●\nNo dia seguinte, a planilha ainda estava errada.\nA professora Vael ainda me olhou com aquele olhar.\nE o Davi ainda era o Davi.\nMas eu acordei de bom humor, e não fiz nenhuma tentativa\nde investigar o motivo.\n●\nFoi Lisa que descobriu primeiro, evidentemente.\n\nLisa tem um dom sobrenatural — e eu uso essa palavra no\nsentido mais literal possível, porque ela de fato possui uma\nhabilidade menor de Percepção Emocional que a Valdris\nnunca classificou formalmente mas que todos os nossos\namigos confirmam empiricamente — para identificar quando\neu estou pensando em alguém.\nEla apareceu na minha mesa do refeitório na manhã seguinte\ncom a bandeja, sentou na minha frente e ficou me olhando\npor exatamente oito segundos antes de dizer:\n— Você falou com o Ian ontem à noite.\nNão foi pergunta.\n— Eu estava acordada — eu disse, com uma naturalidade que\nclaramente não estava convencendo ninguém.\n— Todo mundo estava acordado. Mas só você está com essa\nexpressão.\n— Que expressão?\n— A expressão de quem está tentando não ter expressão\nnenhuma.\nEu comi uma colherada do mingau de ameixa encantada —\nque a Valdris servia às quartas e que tinha o efeito colateral\nduvidoso de deixar qualquer pessoa levemente mais honesta\npor cerca de vinte minutos — e disse:\n— Ele é engraçado.\nLisa pousou o garfo.\n— Você acabou de comer o mingau de quarta.\n\n— Sei disso.\n— Essa foi a declaração mais honesta que você fez sobre ele\naté agora.\nEu não respondi.\nEla sorriu do jeito que a Lisa sorri quando está ganhando uma\ndiscussão sem precisar terminar ela.\n— Só engraçado? — ela disse, depois de um tempo.\n— Por enquanto — eu disse.\nE peguei meu caderno e fingi que precisava ler alguma coisa\nurgente antes da primeira aula.\n●\nA coisa sobre Ian que eu não havia admitido para a Lisa — e\nque o mingau de quarta, a essa altura, já tinha perdido efeito\no suficiente para eu não precisar admitir — era que ele não\nera apenas engraçado.\nEra atento.\nHavia uma diferença entre as duas coisas que eu levei tempo\npara articular, mas que era fundamental: pessoas engraçadas\nte fazem rir. Pessoas atentas percebem quando você parou de\nrir, e ficam quietas junto com você sem fazer disso um\nproblema.\nEu ainda não sabia se Ian era o segundo tipo.\nMas havia indícios.\n\n●\nTrês dias depois da mensagem de madrugada, ele apareceu\nna reunião mensal da Sociedade Atlética.\nIsso era incomum. Ian participava dos torneios, jogava pelos\ntimes, aparecia nas festas — mas as reuniões administrativas\nnão eram o território dele. Eram longas, tinham pauta escrita,\ne envolviam o tipo de conversa sobre orçamento e logística\nque a maioria dos atletas evitava com a mesma determinação\nque evitavam estudar para a prova de Teoria dos Elementos.\nMas lá estava ele.\nSentado duas cadeiras à minha direita.\nCom um caderno aberto que eu tinha quase certeza que estava\nem branco.\nA reunião durou uma hora e quarenta minutos. Durante todo\nesse tempo, eu não olhei pra ele mais do que quatro vezes —\no que, considerando as circunstâncias, eu considero uma\nconquista de autocontrole notável.\nNa terceira vez, ele estava olhando pra mim.\nDesviou o olhar imediatamente, com uma naturalidade\nlevemente exagerada que me disse que ele também estava\ncontando as vezes.\nQuando a reunião terminou e as pessoas começaram a sair,\nele me alcançou no corredor.\n— Então — ele disse — o Davi consertou a planilha?\n— Eu consertei a planilha — eu disse. — O Davi assistiu.\n\nEle riu.\nE aí veio o silêncio daquele tipo específico que acontece\nquando duas pessoas estão andando no mesmo ritmo sem ter\ncombinado isso, e nenhuma das duas quer ser a primeira a\ndobrar no corredor errado.\n— Você foi pra reunião por causa da planilha? — eu\nperguntei, antes de conseguir me impedir.\nEle me olhou de lado.\n— Fui porque eu faço parte da Sociedade, mesmo como\njogador.\n— Você não aparece nas reuniões.\n— Apareço às vezes.\n— Ian. A última reunião que você foi foi há oito meses. O\nDavi tinha acabado de chegar. Você claramente não se lembra\nporque dormiu metade do tempo.\nSilêncio.\n— Ok — ele disse. — Mas a planilha era uma razão válida\nde qualquer forma.\nEu não sorri.\nOu sorri muito pouco para que pudesse ser considerado um\nsorriso de verdade.\nChegamos ao ponto onde o corredor se dividia e cada um\nprecisava ir pro seu lado.\n\n— Boa noite, Serena — ele disse. Com o meu nome inteiro.\n— Boa noite — eu disse.\nE dobrei no corredor certo.\nCom o coração fazendo aquela coisa de novo."}, {"id": "cap4", "title": "Quando os caminhos insistem", "text": "Quando os caminhos insistem\nExiste um feitiço de segundo ano chamado Convergência que\na professora Vael gostava de usar como metáfora para\nqualquer coisa que não tivesse explicação mais simples.\nA Convergência é o princípio pelo qual duas correntes de\nmagia, vindas de fontes completamente diferentes e sem\ncoordenação entre si, acabam criando um ponto de encontro\ninevitável quando as condições certas se alinham. Não é\ndestino — a professora Vael era rígida nesse ponto, destino\nera conceito não científico e ela não tolerava linguagem não\ncientífica dentro das suas aulas. Era física mágica. Era\nsimplesmente o que acontecia quando dois elementos com\nafinidade natural existiam no mesmo espaço por tempo\nsuficiente.\nEles se encontram, ela dizia. Não porque foram programados\npara isso. Mas porque é a única saída possível para a energia\nque criaram juntos.\nEu anotei isso no caderno de primeiro ano.\nEu não sabia, naquela época, por que aquela frase me pareceu\nimportante o suficiente para sublinhar.\n●\nO Festival de Primavera da Valdris era o maior evento do ano\nacadêmico.\nTrês dias de torneios, apresentações, festas e caos organizado\nque envolvia todos os setecentos estudantes, mais visitantes\nde outras academias, mais a comissão julgadora dos torneios\n\ninteracadêmicos, mais pelo menos duas delegações\ndiplomáticas de reinos que tinham tratados de cooperação\nmágica com a Valdris e usavam o festival como desculpa para\npassar um fim de semana num castelo bonito.\nEra a maior bagunça do ano e eu adorava secretamente cada\nsegundo disso.\nMas havia algo no Festival de Primavera — no modo como o\ncastelo inteiro se transformava, com estandartes de cada\nespecialização pendurados nas torres, e as praças internas\ncheias de tendas iluminadas por feitiços de luz colorida, e a\nmúsica que vinha de três direções diferentes ao mesmo tempo\n— que fazia a Valdris parecer, por três dias, o tipo de lugar\nque você escolheria mesmo se tivesse todas as escolhas do\nmundo.\nE eu havia escolhido. Havia ido longe de casa por escolha.\nEntão nesses três dias eu me permitia sentir que tinha\nacertado.\n●\nO torneio de Movimentação Mágica era a abertura oficial do\nfestival.\nEra também, segundo qualquer pessoa que tivesse olhos, o\nevento mais visualmente impressionante dos três dias: vinte\ncompetidores por ano, em duplas, navegando através de um\ncircuito tridimensional de obstáculos que mudava de\nconfiguração a cada rodada — paredes de cristal que se\nreposicionavam, plataformas flutuantes, correntes de vento\nencantado, e, no nível avançado, um grifo mecânico de\ntamanho real que perseguia os competidores pelo trecho final\n\ndo circuito com um entusiasmo que a equipe de manutenção\nda Valdris descrevia como \"calibrado\" e que todos os\nestudantes descreviam como \"claramente não calibrado.\"\nIan competia pelo time de quinto e sétimo ano.\nClaro que competia.\nEu estava nas arquibancadas com a Lisa e com o Theo — o\nnosso amigo do quarto ano, especialização em Alquimia, que\ntinha a teoria de que o grifo mecânico estava consciente e\nguardava rancor pessoal contra quem tirava nota alta em\nEstruturas Mágicas — segurando um copo de suco de laranja\nencantado que mudava de sabor a cada gole dependendo do\nseu humor.\nO meu estava alternando entre framboesa e algo que só\nconseguia descrever como saudade, o que aparentemente era\num sabor que o feitiço reconhecia.\n— Ele é bom — disse a Lisa, sem contexto, olhando pro\ncircuito.\n— Quem? — perguntei.\nEla não respondeu.\nPorque era óbvio quem.\nIan estava no terceiro trecho do circuito, navegando entre as\nplataformas flutuantes com uma facilidade que parecia\ninjusta. A Magia de Movimento não era ostensiva — não\nproduzia faíscas coloridas nem explosões visíveis. Era mais\nsutil do que isso: era a diferença entre um corpo que lutava\ncontra o espaço e um corpo que se entendia com ele. Como\n\nse a gravidade fosse uma sugestão que ele considerava, mas\nnão necessariamente aceitava.\nO grifo mecânico entrou no circuito no trecho final.\nHouve um som coletivo das arquibancadas — parte\nentusiasmo, parte pânico solidário — quando a criatura\ndobrou a primeira curva com as asas metálicas abertas, os\nolhos acesos de âmbar, seguindo os competidores com uma\nprecisão que claramente tinha sido programada por alguém\nque não gostava muito dos estudantes.\nIan olhou pro grifo.\nO grifo olhou pro Ian.\nE então Ian fez alguma coisa que eu não consegui\nacompanhar completamente — um movimento que era\nmenos um feitiço e mais uma negociação, como se ele tivesse\ndito alguma coisa ao grifo em vez de tentar escapar dele — e\na criatura pausou, inclinou a cabeça mecânica de um lado, e\ndeixou Ian passar.\nO circuito inteiro ficou em silêncio por meio segundo.\nDepois as arquibancadas explodiram.\n— O que ele fez? — perguntei.\n— Magia de Movimento Aplicada — disse o Theo, com o\ntom de quem estava tomando nota. — Mas também pode ter\nsido sorte.\n— Não foi sorte — disse a Lisa.\nEla estava olhando pra mim quando disse isso.\n\nEu tomei um gole do suco. Estava com gosto de framboesa\noutra vez.\n●\nA cerimônia de encerramento do primeiro dia de torneios\nacontecia numa das praças internas, sob os estandartes\niluminados e com a banda dos estudantes do segundo ano\ntocando um repertório que era, diplomaticamente, ambicioso.\nEu estava lá por obrigação de tesoureira — havia uma\nprestação de contas a fazer para a coordenação da Sociedade\nao final do dia — mas fiquei depois da prestação de contas\nporque a Lisa havia encontrado um grupo de amigos do\nquarto ano e eu não tinha vontade de voltar sozinha pro quarto\nainda.\nHavia algo no ar do festival que tornava o quarto vazio mais\nvazio do que o normal.\nFoi o Theo quem viu primeiro.\n— O time de Ian está ali — ele disse, apontando\ndiscretamente para um grupo do outro lado da praça.\n— E daí? — disse eu.\n— E daí que ele está olhando pra cá faz uns três minutos.\n— Theo.\n— Estou apenas informando os fatos. Sou um cientista.\n— Você é alquimista.\n— Que é ciência com estética melhor.\n\nEu não olhei. Fiz questão de não olhar.\nTomei o último gole da bebida que alguém havia me passado\n— alguma coisa levemente efervescente com gosto de\npêssego encantado — e prestei atenção na banda que estava\ntocando alguma coisa que pretendia ser uma valsa mas estava\nse tornando outra coisa no meio.\nE então, inevitavelmente, porque a Convergência é física\nmágica e não escolha pessoal:\n— Serena.\nA voz dele chegou antes de eu virar.\nIan estava ali, com dois dos seus companheiros de time atrás\ndele e com aquela expressão que eu já havia aprendido a\nreconhecer como a versão dele de estou fingindo que chegar\naqui foi casual — levemente confiante demais, levemente\nciente demais de onde estavam as próprias mãos.\n— Ian — eu disse.\n— Você viu o circuito? — ele perguntou.\n— Vi.\n— E?\nPausa.\nEu sabia o que ele queria que eu dissesse. E eu sabia que ele\nsabia que eu sabia.\n\n— O grifo mecânico claramente tem preferências pessoais —\neu disse. — Não necessariamente diz alguma coisa sobre o\ncompetidor.\nEle abriu um sorriso que era, objetivamente, um problema\npara a minha capacidade de manter expressão neutra.\n— Isso foi um elogio? — ele disse.\n— Foi uma observação científica.\n— Soa como elogio.\n— Soa como você interpretando o que quer ouvir.\nO Theo, ao meu lado, emitiu um som pequeno que era\nclaramente uma risada disfarçada de tosse.\nIan olhou pro Theo.\n— Theo.\n— Ian. — O Theo acenou com o copo. — Boa corrida hoje.\n— Obrigado. — Ian voltou os olhos pra mim. — Posso te\nroubar por um segundo?\nUm segundo era tecnicamente uma unidade de tempo, então\na resposta deveria ser simples.\nNão foi simples.\n— Por quê? — eu disse.\n— Porque tem uma coisa que eu preciso te mostrar e vai ser\nmais fácil mostrar do que explicar.\n\nOlhei pra Lisa. Lisa estava olhando pro teto com uma\nexpressão de não vou interferir nessa situação de jeito\nnenhum que era, na prática, uma interferência enorme.\n— Um segundo — eu disse.\n●\nO que Ian queria me mostrar estava no corredor leste do\nsegundo andar — um dos poucos corredores do festival que\nnão havia sido decorado com estandartes e não tinha\nmovimento de pessoas, porque levava apenas ao ateliê de\nMagia Natural que ficava fechado durante os eventos.\nHavia uma vespa.\nNão uma vespa comum — embora vespas comuns já fossem\nsuficientemente incomuns dentro de um castelo no meio de\num festival de magia. Era uma vespa feita inteiramente de luz\nâmbar, do tamanho de um punho fechado, pousada na\nmaçaneta de ferro da porta do ateliê com uma imobilidade\nque só existia em coisas encantadas.\n— O que é isso? — eu disse.\n— Um feitiço residual — ele disse. — Do torneio. Às vezes\nficam para trás quando a Magia de Movimento encontra\nalguma coisa com afinidade natural. Como a madeira velha\ndesse corredor, por exemplo. — Fez um gesto vago para a\nparede. — Fica preso num ponto e continua existindo até\ndissipar.\nEu me aproximei devagar.\nA vespa de luz não se moveu. Só pulsou uma vez,\nsuavemente, como se estivesse respirando.\n\n— Por que você me trouxe pra ver isso? — perguntei.\nIan ficou quieto por um momento.\n— Porque — ele disse, eventualmente — o corredor de\nMagia Natural tem afinidade com você. Todo mundo que\npassa por aqui regularmente deixa um rastro. E o feitiço foi\npra esse ponto especificamente. Então tecnicamente... —\npausa — ...é um pouco seu.\nOlhei pra ele.\nEle estava olhando pra vespa, com as mãos no bolso e um\njeito levemente cuidadoso de segurar a expressão que eu\nreconheci, porque era o jeito que eu ficava quando havia dito\nalguma coisa mais honesta do que planejava e estava\nesperando ver se tinha sido um erro.\nA vespa pulsou de novo.\n— Isso é uma explicação muito longa — eu disse, — pra\nbasicamente me dizer que achou uma vespa brilhante num\ncorredor.\nEle riu. O tipo de risada que é alívio disfarçado de diversão.\n— Era a única razão que eu consegui inventar — ele admitiu.\n— Razão pra quê?\n— Pra ter um motivo válido de te chamar aqui.\nO corredor estava quieto. Lá fora, a banda tocava alguma\ncoisa que havia desistido de ser uma valsa e havia aceitado\nsua natureza como improviso.\n\nA vespa de luz deu um voo pequeno, circulou a maçaneta uma\nvez, e pousou de volta no mesmo lugar.\n— É bonita — eu disse, por fim.\n— É — ele disse.\nMas ele não estava olhando pra vespa.\n●\nVoltei pra praça dez minutos depois.\nA Lisa me olhou por três segundos e não disse nada.\nO Theo me olhou por três segundos e disse:\n— Convergência.\n— Cala boca, Theo — eu disse.\n— Estou apenas nomeando o fenômeno — ele disse, com a\ndignidade de quem acredita estar prestando um serviço\ncientífico.\nEu sentei, peguei minha bebida, e olhei pro céu de Valdris\nque estava indo de roxo para o preto profundo de meia-noite.\nNão olhei pro lado onde Ian havia voltado para o grupo dele.\nOu olhei só uma vez.\nO suco estava com gosto de framboesa.\nSó framboesa, dessa vez.\nSem o sabor de saudade."}, {"id": "cap5", "title": "A garota da muleta", "text": "A garota da muleta\nA festa anual da Guilda dos Ventos acontecia todo ano no\núltimo sábado de outubro, num salão subterrâneo que a\nValdris mantinha selado durante os outros onze meses e que\ncheirava, quando finalmente abria, a pedra úmida e a alguma\ncoisa doce que ninguém conseguia identificar com precisão\nmas que todo mundo concordava que era agradável.\nA Guilda dos Ventos era uma das três guildas estudantis da\nacademia — a outra era a Guilda da Chama, que tinha a\nreputação de ser mais barulhenta e menos confiável com\nobjetos inflamáveis, e a Guilda das Águas Profundas, que era\na mais tranquila e que organizava eventos que terminavam\nsempre antes da meia-noite com uma pontualidade que os\noutros dois grupos achavam suspeita.\nEu era da Guilda dos Ventos desde o segundo ano. Não por\nser a mais popular — era a segunda, atrás da Chama — mas\nporque havia algo no elemento que me dizia respeito de um\njeito que eu conseguia sentir mas dificilmente explicar. Vento\nera o elemento que não ficava parado, que não pertencia a\nnenhum lugar específico, que passava por tudo sem pedir\npermissão.\nEu me identifiquei imediatamente.\n●\nO problema havia começado três dias antes da festa.\nTinha uma disciplina eletiva de Artes Marciais Mágicas que\neu havia escolhido por impulso no início do semestre — uma\n\ndecisão que, em retrospecto, dizia muito sobre a minha\nrelação com a ideia de que tentar coisas novas era sempre\numa boa ideia. A professora era pequena, silenciosa, e\npossuía uma visão bastante otimista sobre a capacidade dos\nestudantes de absorver golpes sem sequelas.\nNo terceiro encontro da disciplina, praticando uma sequência\nde esquiva que envolvia um giro e um salto curto, eu calculei\nmal a distância da parede.\nO meu pé direito calculou pior ainda.\nO barulho foi pequeno. A dor foi proporcional ao barulho —\nou seja, pequena o suficiente para eu ignorar, grande o\nsuficiente para eu saber que havia feito alguma coisa errada.\nA professora olhou, fez aquela expressão de acontece, e me\nmandou pra enfermaria.\nA enfermaria confirmou o que eu já suspeitava: nada sério,\nmas o segundo dedo do pé direito não ia cooperar da forma\nnormal pelos próximos dias devido à fratura, e a enfermeira\nDora — que tinha uns sessenta anos e a paciência de quem já\nviu estudante de magia fazer coisa pior do que quebrar o dedo\n— me deu uma muleta com a expressão de quem estava\nentregando uma sentença.\n— Quatro dias — ela disse. — Talvez três, com magia\ncurativa.\n— A festa da Guilda é em três dias — eu disse.\n— Então quatro — ela disse.\n●\nEu fui assim mesmo.\n\nA Lisa disse que eu era teimosa.\nEu disse que ela estava usando essa palavra como se fosse um\ndefeito.\nEla disse que estava usando como um defeito.\nEu fui assim mesmo.\n●\nO salão subterrâneo da Guilda dos Ventos ficava dois lances\nde escada abaixo do nível térreo, o que com uma muleta era\numa experiência que eu não recomendo, mas da qual saí\nvitoriosa e apenas levemente mais frustrada do que quando\nhavia entrado. A Lisa desceu do meu lado com os braços\nlevemente abertos, como se fosse me segurar se eu\ntropeçasse, e com a sabedoria de não comentar nada sobre\nisso.\nO salão era bonito, nos anos em que eu conseguia me lembrar\nde achá-lo bonito. As paredes exalavam aquela luz âmbar\nsuave que as pedras antigas da Valdris produziam quando\naquecidas por magia de festa, e havia redemoinhos de vento\nencantado circulando perto do teto, carregando pétalas secas\nque não caíam nunca, apenas circulavam infinitamente no\nmesmo padrão.\nHavia muita gente. Música de alguma fonte que eu não\nconseguia localizar. Mesas com comida que cheirava a\nespeciarias que eu não sabia nomear.\nE havia Ian.\nClaro que havia Ian.\n\nEle estava do outro lado do salão, com dois amigos do time\nde Movimento, e usava alguma coisa escura que eu não\nconseguia descrever melhor do que funcionava bem nele, o\nque era uma análise objetiva e não tinha nenhuma carga\nemocional.\nEu me coloquei estrategicamente de costas para o lado onde\nele estava.\nA Lisa observou essa manobra com a expressão de quem está\ntomando nota.\n— Não fala nada — eu disse.\n— Não falei nada — ela disse.\n— Estava pensando alto.\n— Estava sim — ela concordou, e foi buscar alguma coisa\npra beber com um sorriso que eu fingi não ver.\n●\nO problema de se colocar de costas para alguém é que você\nfica sem informação sobre onde esse alguém está, o que na\nprática significa que você passa a noite inteira levemente\ntenso esperando que ele apareça no seu campo de visão de\nforma inesperada.\nFoi o que aconteceu.\nEle surgiu na minha direita enquanto eu estava no meio de\numa conversa com o Theo sobre uma teoria que o Theo tinha\n— e o Theo sempre tinha teorias — de que o grifo mecânico\ndo torneio havia desenvolvido preferências estéticas e que\n\nisso explicava por que ele perseguia mais ferozmente os\nestudantes que usavam verde.\n— A muleta — disse Ian, sem preâmbulo.\nEu me virei.\nEle estava olhando pro meu pé com uma expressão que era\ngenuinamente preocupada, e havia algo nisso que me\ndesarmou antes que eu pudesse me armar.\n— Artes Marciais Mágicas — eu disse, num tom que\npretendia ser levemente entediado com o assunto.\n— A professora Kael?\n— A própria.\n— Ela fraturou o polegar do meu parceiro de treino no ano\npassado — ele disse. — Com um feitiço de amortecimento.\nDe amortecimento.\n— Isso é um elogio ou uma crítica?\n— É uma contextualização. — Ele olhou pro Theo. — Theo.\n— Ian. — O Theo acenou. — Você viu que o grifo mecânico\nperseguiu três pessoas de verde essa semana?\n— Theo — eu disse.\n— Estou coletando dados.\nIan desviou os olhos do Theo e voltou pra mim.\n— Tá com dor?\n\n— Não.\n— Parece que tá.\n— Estou bem.\nEle ficou quieto por um segundo, com aquela expressão que\neu estava aprendendo a reconhecer como a versão dele de\nvocê está mentindo mas eu não vou pressionar.\n— Quer sentar? — ele disse, eventualmente. — Tem uma\nárea mais tranquila perto das colunas.\nHavia, de fato, uma área com bancos de pedra encostados nas\ncolunas antigas do salão, onde a luz era mais baixa e o barulho\nchegava amortecido. Era o tipo de lugar onde você se sentava\nquando queria estar na festa sem estar completamente dentro\ndela.\nEra exatamente o tipo de lugar que eu teria escolhido sozinha.\n— Pode ser — eu disse.\n●\nSentamos.\nA muleta ficou encostada na coluna entre a gente, ocupando\no espaço que nenhum dos dois sabia muito bem como\npreencher de outra forma.\nA conversa começou devagar, como todas as nossas\nconversas começavam — cautelosa, com cada um testando o\nterreno antes de pisar de verdade. Mas havia algo no salão\nnaquela noite, talvez a luz âmbar, talvez a música que\n\nchegava de longe o suficiente para não atrapalhar, que\ntornava o silêncio confortável em vez de tenso.\nEle me contou sobre o festival interacadêmico que estava se\naproximando — a Valdris iria receber delegações de outras\ntrês academias, e o time de Movimento havia sido escalado\npara uma apresentação de abertura que Ian descrevia com a\nexpressão específica de quem está animado mas não quer\nparecer animado demais.\nEu contei sobre uma aula de Magia Natural da semana\nanterior em que havia conseguido fazer uma semente de\ncarvalho germinar em dois minutos — o que era,\ntecnicamente, um feito relevante para uma estudante de\nterceiro ano, e que a professora Vael havia descrito com a\npalavra satisfatório, que na escala dela equivalia a uma\novação de pé.\n— Satisfatório — ele repetiu.\n— É muito, vindo dela.\n— Como você fica satisfeita com satisfatório?\n— Porque eu conheço a escala dela. Adequado significa que\nvocê fez o mínimo. Satisfatório significa que ela teve que\nesforçar menos o rosto quando olhou pro seu trabalho. Bom\nela nunca usou em três anos de carreira que eu saiba. E uma\nvez ela disse promissor pra uma aluna de quinto ano e todo\nmundo ficou sabendo em menos de uma hora.\nEle riu.\nE então eu ri, daquele jeito involuntário de novo, antes de\nconseguir decidir se queria.\n\n— Você gosta de lá — ele disse. Não pergunta.\n— Da aula dela?\n— Da Valdris. Do que você escolheu estudar. Você gosta de\nverdade.\nFiquei quieta um segundo, porque a observação havia\nchegado de um ângulo que eu não esperava.\n— Gosto — eu disse.\n— Isso aparece. Quando você fala sobre. — Pausa. — Nem\nsempre aparece nas pessoas.\nHavia algo naquilo que ficou comigo mais tempo do que o\nnecessário. Não era elogio — era observação. E observações\ndizem mais sobre quem observa do que sobre quem é\nobservado.\nIan prestava atenção.\nEu ainda não sabia completamente o que fazer com isso.\n●\nA Lisa apareceu eventualmente, com o Theo e mais dois\namigos do quarto ano que eu conhecia de passagem, e a área\ntranquila das colunas se transformou num grupo pequeno que\ndurou até a festa começar a esvaziar.\nEm determinado momento, alguém propôs um brinde\ncoletivo com as bebidas encantadas da Guilda — que tinham\no efeito de produzirem uma faísca colorida quando você\nchocava os copos, correspondendo ao humor de cada pessoa\n— e houve um momento breve, quando minha faísca e a de\n\nIan saíram ao mesmo tempo e se encontraram no meio,\nproduzindo uma cor que ninguém do grupo soube nominar\nmas que o Theo descreveu como inequivocamente dourada.\n— O que significa dourado? — perguntei pra ele.\n— Precisaria de mais dados — disse o Theo, com um sorriso\nque eu achei suspeito.\nIan não disse nada.\nMas eu notei que ele não desviou o olhar.\n●\nQuando a festa começou a esvaziar, Ian foi quem carregou a\nmuleta escada acima enquanto eu subia.\nEu não pedi.\nEle simplesmente pegou, com uma naturalidade que tornava\ndifícil protestar sem transformar o gesto em alguma coisa\nmaior do que era — ou do que eu estava disposta a admitir\nque era.\nNo topo da escada, ele devolveu a muleta.\n— Obrigada — eu disse.\n— Por uma escada? — ele disse.\n— Por duas.\n— Eram duas?\n— Ida e volta.\n\nEle inclinou levemente a cabeça, com aquele sorriso que eu\nhavia catalogado no início como arma padrão e que agora,\nhonestamente, precisava recategorizar como alguma coisa\nmais específica que eu ainda não tinha nome pra dar.\n— Boa noite, Serena — ele disse.\nE foi.\nA Lisa apareceu do meu lado em aproximadamente três\nsegundos.\n— Não — eu disse, antes que ela abrisse a boca.\n— Não falei nada — ela disse.\n— Continue assim.\nEla continuou em silêncio por exatamente sete passos.\n— Dourado — ela disse, então.\nEu fingi não ouvir.\nMas sorri no escuro do corredor, sozinha, voltando pro quarto\ncom a muleta e o coração fazendo aquela coisa que eu havia\nparado de fingir que era efeito colateral de chá errado."}, {"id": "cap6", "title": "O óculos que talvez nunca existiu", "text": "O óculos que talvez nunca existiu\nExiste uma teoria mágica — não da professora Vael, essa é\ndo professor Alden, que leciona Percepção e Realidade no\nquinto ano e que tem a aparência de alguém que dormiu mal\ndesde os anos noventa — que diz o seguinte:\nMemória não é arquivo. Memória é reconstrução. Toda vez\nque você lembra de alguma coisa, você a está recriando\nligeiramente diferente do que era antes. Os detalhes que\nficam são os que importaram. Os que somem são os que o seu\ncérebro decidiu que eram dispensáveis.\nEu pensei muito nessa teoria depois de um determinado dia.\nPorque Ian jura que lembra.\nE eu juro que não havia nada pra lembrar.\n●\nEra uma quarta-feira comum, daquelas que existem\nespecificamente para provar que o meio da semana é um lugar\nonde o tempo desacelera por princípio. Eu estava\natravessando o corredor do terceiro andar — o corredor das\nsalas de aula das especializações práticas, que era sempre\nbarulhento porque alguém estava sempre testando alguma\ncoisa que produzia som — em direção à sala de Botânica\nMágica, com os cabelos presos de qualquer jeito e os\nmateriais do dia embaixo do braço, quando lembrei que havia\nesquecido de entregar um comunicado da Sociedade Atlética\npara o coordenador do torneio interacadêmico.\nO coordenador ficava na sala 7C.\n\nA sala 7C ficava no corredor das especializações avançadas.\nEu precisava fazer um desvio de três minutos, no máximo.\n●\nA sala 7C estava ocupada. Havia uma aula de Magia de\nMovimento em andamento — o professor visível pelo vidro\nda porta, os alunos espalhados pelo espaço de um jeito que\nera menos sala de aula e mais arena pequena — e eu bati\nlevemente antes de entreabrir a porta só o suficiente para\nalcançar o comunicado ao coordenador, que ficava sempre\nperto da entrada.\nNão entrei.\nFiquei no batente, estendi o papel, troquei duas palavras com\no coordenador, e saí.\nTudo isso levou quarenta e cinco segundos.\nNo dia seguinte, Ian apareceu na minha mesa do refeitório\ncom uma expressão que eu reconheceria mais tarde como a\nversão dele de tenho uma coisa importante a dizer e não sei\nse vai ser bem recebida.\n— Você passou pela 7C ontem — ele disse.\n— Sim — eu disse.\n— Você estava usando aquele óculos oval.\nParei de mexer no café.\n— Não — eu disse.\n\n— Estava sim.\n— Ian. Meus óculos não são ovais.\n— Eram de armação mesclada. Finos. Ficavam bem em você.\n— Eu nunca usei esse óculos na minha vida.\n— Ontem você estava usando.\nEu o olhei. Ele me olhava de volta com uma convicção\nabsolutamente inabalável que era, objetivamente, a coisa\nmais irritante que eu havia encontrado nele até então.\n— Você estava na aula — eu disse. — Distraído. Você viu\nalguém passar pela porta por dois segundos e imaginou\nalguma coisa.\n— Não imaginei.\n— Ou confundiu com outra pessoa.\n— Conheço você.\n— Então sabe que eu não uso esse óculos.\n— Sabia. Agora sei que você usa às vezes e nega.\nEu fechei o caderno com uma firmeza que expressava\nclaramente minha posição sobre o assunto.\n— Esse óculos não existe — eu disse.\n— Existe — ele disse.\n— Não existe.\n\n— Existe. Era escuro, armação fina e oval, e você não\npercebeu que estava sendo observada.\n— Porque não havia esse óculos pra ser observado.\nA Lisa, que estava sentada do meu lado e que havia fingido\nestar muito ocupada com o próprio café durante toda essa\nconversa, disse:\n— Eu nunca vi você com esse óculos, Serena.\n— Obrigada, Lisa.\n— Mas — ela acrescentou, com o tom específico de alguém\nque sabe que está prestes a piorar a situação, — eu também\nnão estava na 7C ontem.\nIan abriu aquele sorriso.\nEu apontei pra ele com o lápis.\n— Isso não foi uma validação — eu disse. — Ela disse que\nnão sabe. Não saber é diferente de confirmar.\n— Eu sei o que vi — ele disse.\n— Você viu o que quis ver.\n— Que seria?\nSilêncio.\nEu peguei o café, me levantei, e disse:\n— Boa aula de Botânica — com uma dignidade que\nconsiderei exemplar nas circunstâncias.\n\n●\nO óculos que não existia tornou-se, inexplicavelmente, um\nassunto recorrente.\nNão foi planejado. Não foi nenhum de nós dois que decidiu\nque aquilo viraria uma coisa. Simplesmente virou.\nTrês dias depois, Ian apareceu com um desenho numa folha\nde caderno — um esboço rápido, claramente feito durante\nalguma aula em que deveria estar prestando atenção em outra\ncoisa — de um par de óculos de armação escura e oval, com\numa legenda embaixo que dizia evidência física, caso nº 1.\nEu dobrei o papel e devolvi.\n— Isso não prova nada.\n— Demonstra memória consistente.\n— Demonstra que você tem muito tempo livre.\nNa semana seguinte, o Theo apareceu na minha mesa com a\nexpressão de alguém que estava envolvido numa situação da\nqual não se orgulhava completamente.\n— Ian me pediu pra perguntar se você tem histórico de uso\nde óculos mágicos de ver-no-escuro — ele disse.\n— Não — eu disse.\n— Isso foi o que eu disse que você ia dizer.\n— E você fez a pergunta assim mesmo.\n— Ele é muito persuasivo quando quer dados.\n\n— Você é alquimista, Theo. Você deveria ter resistência a\npersuasão não científica.\n— Devia — ele concordou, e se afastou com a expressão de\nalguém que estava tomando nota do próprio fracasso\nmetodológico.\n●\nA coisa sobre a piada do óculos — que eu me recusava a\nchamar de piada, porque piada implicava que havia algo\nengraçado naquilo, o que havia, mas eu não estava pronta pra\nadmitir — era o que ela revelava sobre Ian sem que ele\npercebesse que estava revelando.\nEle havia me visto de passagem, por quarenta e cinco\nsegundos, da metade de uma sala de aula, enquanto\nteoricamente estava prestando atenção em outra coisa.\nE havia memorizado a armação dos óculos.\nQue eu insistia que não existiam.\nMas esse era o ponto.\nNão era sobre os óculos.\nEra sobre o fato de que Ian prestava atenção naquilo que eu\nfazia de um jeito que a maioria das pessoas não prestava. Não\nde um jeito invasivo — de um jeito presente. De um jeito que\ndizia eu noto você sem precisar dizer em voz alta.\nE isso era, em alguma medida que eu ainda estava calculando,\ndiferente de qualquer coisa que eu havia encontrado antes.\n●\n\nO vestido aconteceu numa quinta-feira.\nEu tinha uma reunião da Sociedade Atlética à tarde e uma\naula de Magia Natural de manhã, e havia acordado com a\nenergia estranha desses dias em que você se veste no\nautomático e só percebe o que colocou quando já está\nandando pelo corredor.\nO vestido era branco com detalhes em amarelo-âmbar —\ncomprado numa feira em Valdris Baixa no começo do ano,\nesquecido no fundo do armário por meses, reencontrado\nnaquela manhã específica como se estivesse esperando pelo\nmomento certo. Era esvoaçante, levinha, do tipo que se move\nantes de você.\nEu precisava entregar um aviso sobre o torneio\ninteracadêmico pessoalmente ao professor responsável, que\nficava justamente no corredor das especializações avançadas.\nJustamente na sala 7C.\nEntrei, entreguei, saí.\nQuarenta e cinco segundos. Talvez menos.\nNão pensei nada sobre isso.\n●\nNa manhã seguinte, Ian apareceu na minha mesa do\nrefeitório.\nDessa vez sem o sorriso preparado. Só direto, como se a coisa\nfosse urgente:\n— O vestido de ontem.\n\nEu levantei os olhos do caderno.\n— O quê sobre ele?\n— Branco. Com âmbar. Esvoaçava quando você andava.\nPausa.\n— E daí? — eu disse.\n— Ficava bem em você — ele disse. — Muito bem.\nHavia algo na entrega daquilo que era diferente das outras\nobservações que ele havia feito — mais direto, menos\nembrulhado em brincadeira. Como se ele tivesse guardado\naquilo e decidido que ia falar de qualquer jeito, consequências\nà parte.\nEu não soube o que fazer com isso por um segundo inteiro.\n— Você tem uma memória muito seletiva — eu disse,\neventualmente.\n— Tenho — ele concordou, com uma tranquilidade que me\nirritou de um jeito específico, que era o jeito que as coisas\nirritam quando você não consegue discordar completamente.\n— Também deve ter lembrado do óculos que não existe.\n— Ontem você não estava de óculos.\n— Coerente.\n— Serena. — Ele esperou até eu olhar de volta pra ele. — Só\nqueria te falar.\n\n— Que o vestido ficava bem.\n— Que eu notei.\nEram palavras simples. Não eram declaração nem promessa.\nEram simplesmente o que eram: eu estava prestando atenção\nem você.\nO refeitório continuava barulhento ao redor de nós. O chá\nesfriava. O Theo, em algum lugar atrás de mim, estava\nprovavelmente tomando nota de alguma coisa.\n— Ok — eu disse.\n— Ok? — ele disse.\n— Ok — eu repeti, e voltei pro caderno.\nMas havia um calor pequeno atrás do esterno que eu não fiz\nnenhuma tentativa de explicar.\n●\nMais tarde, narrando o episódio para a Lisa no quarto dela,\nela ouviu tudo em silêncio e então disse:\n— Ele notou o vestido.\n— Notou.\n— E foi te contar especificamente.\n— Foi.\n— Serena.\n\n— Lisa.\n— Você sabe o que isso significa.\n— Significa que ele tem memória visual acima da média.\n— Significa que ele está prestando atenção em você de um\njeito diferente.\n— Lisa.\n— Quando se importa — ela terminou, com aquela firmeza\ntranquila que era o jeito dela de dizer as coisas que eu\nprecisava ouvir mas ainda não estava pronta.\nEu fiquei olhando pro teto do quarto dela por um momento.\n— O óculos ainda não existe — eu disse.\nA Lisa riu.\nE não insistiu mais naquela noite.\nPorque ela sabia, como eu sabia — mesmo sem admitir ainda\n— que algumas coisas não precisam de nomes imediatos.\nElas só precisam de tempo."}, {"id": "cap7", "title": "Entre risadas e silêncio", "text": "Entre risadas e silêncio\nExiste um feitiço de terceiro ano que eu havia estudado na\nsemana anterior chamado Ressonância Passiva.\nÉ um conceito simples na teoria, absurdamente difícil na\nprática: você precisa aprender a perceber a frequência mágica\nde outro ser vivo sem tentar interferir nela. Sem tentar mudar.\nSem tentar sincronizar. Apenas perceber — como quando\nvocê entra num quarto e sente que alguém esteve ali antes de\nvocê, mas sem nenhuma prova concreta além de uma\nsensação na pele.\nA professora Vael dizia que a maioria dos estudantes nunca\naprendia de verdade. Não porque fossem incapazes. Mas\nporque perceber sem interferir era uma das coisas mais\ndifíceis que existiam.\nEu anotei isso no caderno.\nSublinhei duas vezes.\nE tentei não pensar no motivo.\n●\nO festival interacadêmico durou quatro dias.\nQuatro academias. Centenas de estudantes que não se\nconheciam, tentando se conhecer com a urgência específica\nde quem tem pouco tempo e muita curiosidade. Os corredores\nda Valdris ficaram diferentes — mais barulhentos, mais\ncoloridos, com uniformes de outras casas misturados aos\n\nnossos e conversas em sotaques que eu precisava de um\nsegundo extra pra acompanhar.\nEu estava no comitê de recepção da Sociedade Atlética, o que\nna prática significava que eu passava a maior parte do tempo\ncom um caderno na mão verificando listas e tentando garantir\nque as delegações visitantes encontrassem os salões certos\nantes de encontrarem os salões errados — o que na Valdris,\ncom os corredores que às vezes mudavam de ideia, era uma\npreocupação concreta.\nEra trabalho de bastidores.\n●\nFoi na tarde do segundo dia que eu me perdi.\nNão de verdade, quer dizer — eu conheço a Valdris\nsuficientemente bem para não me perder de um jeito que\nresulte em ficar vagando por horas. Mas havia um corredor\nno quarto andar que eu precisava usar para chegar ao salão de\nrecepção mais rápido, e esse corredor havia decidido, no\nespírito do festival, ser outro corredor completamente\ndiferente.\nParei.\nOlhei pro corredor.\nO corredor não parecia arrependido.\nEu tinha duas opções: voltar e contornar pelo caminho longo,\nou tentar a escada estreita que eu sabia que existia em algum\nlugar desse andar mas que eu nunca havia usado porque tinha\na aparência de uma decisão que não terminava bem.\n\nEscolhi a escada.\nA escada era, de fato, estreita. E baixa. E tinha um cheiro de\npedra antiga que era diferente do cheiro de pedra antiga do\nresto da Valdris — mais denso, mais quieto, como se aquele\npedaço do castelo não tivesse recebido muito tráfego nos\núltimos séculos.\nHavia luz suficiente para enxergar. Não muito mais do que\nisso.\nE então, na curva do segundo lance:\n— Serena?\nEu me virei.\nIan estava lá, igualmente parado na escada, igualmente sem\nnenhuma razão aparente de estar naquele lugar específico da\nValdris às três da tarde de um dia de festival.\nOlhamos um pro outro por um segundo.\n— O corredor? — eu disse.\n— O corredor — ele confirmou.\n— Que direção você precisava?\n— Salão leste.\n— Eu também.\nFicamos em silêncio por mais um segundo, porque o absurdo\nda situação estava processando em paralelo com a questão\nprática de como navegá-la.\n\n— Eu sei como sair daqui — ele disse.\n— Eu também sei.\n— Mas você estava indo pra cima.\n— Estava testando uma teoria.\nEle inclinou a cabeça.\n— A teoria era que a escada levava ao leste?\n— A teoria era que o quarto andar tem saídas que a maioria\ndas pessoas ignora.\n— E?\n— E aparentemente não sou a primeira a testá-la — eu disse,\ncom um gesto vago na direção dele.\nIan riu. O tipo de risada que não planejou sair, pequena e\ngenuína, que chegou antes que ele pudesse decidir se queria\nque chegasse.\nDescemos juntos.\nNão foi nenhum grande momento, no sentido de que nada\ndramático aconteceu. Apenas dois estudantes descendo uma\nescada estreita e antiga num castelo durante um festival,\nprecisando dobrar levemente as cabeças no teto baixo,\ncomentando sobre o cheiro da pedra velha e sobre como o\nTheo havia apresentado ao grupo uma nova teoria de que a\nValdris era semiconsciente e movia os corredores com\nintenção e não aleatoriamente.\n— Ele tem dados? — eu perguntei.\n\n— Theo sempre tem dados. A questão é se os dados provam\no que ele diz que provam.\n— E provam?\n— Provisoriamente. O corredor leste teve dezoito\nredirecionamentos nos últimos três meses. Dez deles\naconteceram quando havia alunos de primeiro ano perdidos.\nFiz uma pausa.\n— Isso pode ser coincidência.\n— Pode — ele concordou. — O Theo diz que coincidência é\no nome que a gente dá pra padrões que ainda não entendemos.\n— Isso é o Theo ou isso é você?\nEle me olhou de lado, com um sorriso que eu percebi, naquela\nescada específica com aquela luz específica, que havia\naprendido a reconhecer muito bem nos últimos meses. Não o\nsorriso de arma padrão do início. Esse era outro — menos\ncalculado, mais honesto.\n— As duas coisas — ele disse.\n●\nChegamos ao salão leste com seis minutos de antecedência.\nO que, considerando a Valdris, era tecnicamente uma vitória.\nFicamos do lado de fora por alguns minutos, porque dentro já\nhavia gente suficiente e nenhum dos dois tinha pressa urgente\nde entrar. O corredor do salão leste tinha janelas altas que\ndavam pro jardim interno — um dos jardins que a Valdris\n\nmantinha encantado para florescer independente da estação,\ncom aquelas flores azuis de pétalas grandes que produziam\num perfume levemente diferente dependendo da hora do dia.\nAquela hora cheirava a algo que eu não conseguia nomear.\nBom. Apenas bom.\n— Posso te perguntar uma coisa? — Ian disse, depois de um\ntempo em que ficamos olhando pro jardim em silêncio.\n— Pode.\n— Por que você escolheu Magia Natural?\nEu olhei pra ele.\nEra uma pergunta simples. Mas era uma pergunta que a\nmaioria das pessoas não fazia — não porque não tivessem\ncuriosidade, mas porque geralmente as pessoas perguntam\nsobre resultados e não sobre origens. Por que você é boa\nnisso, não por que você escolheu esse caminho.\n— Porque é a área que respeita o tempo das coisas — eu\ndisse, eventualmente. — Você não pode forçar. Pode preparar\no terreno, pode criar condições, mas a semente germina\nquando está pronta. Não quando você quer.\nEle ficou quieto.\n— E isso faz sentido pra você.\n— Faz — eu disse. — Cresci num lugar onde o tempo\nfunciona diferente. Onde você aprende que algumas coisas\ntêm o próprio ritmo e a pressa estraga.\n\n— A fazenda — ele disse.\nOlhei pra ele.\nNão era informação nova — eu havia mencionado a fazenda\nem conversas anteriores, de passagem. Mas o fato de que ele\nhavia guardado aquilo, ligado as peças, chegado ao lugar\ncerto sozinho — isso era outra coisa.\n— Sim — eu disse.\n— Você sente falta.\nNão foi pergunta.\n— Todo dia — eu disse. Com uma honestidade que saiu antes\nque eu decidisse se queria que saísse.\nEle assentiu devagar. Não disse que entendia, não tentou\nminimizar, não ofereceu a versão de consolo que as pessoas\noferecem quando não sabem o que fazer com a\nvulnerabilidade do outro. Ficou quieto com aquilo.\nE eu, sem ter planejado, continuei:\n— Tem um cavalo lá. O Trovão. Malhado, teimoso como eu,\ncompletamente inútil em termos de obediência e\ncompletamente essencial em termos de tudo mais. — Pausa.\n— Às vezes quando estou naquelas semanas em que tudo\nparece pesado demais, eu lembro dele especificamente. A\nsensação de andar a cavalo num campo aberto quando o sol\nainda está saindo. A liberdade disso.\nIan estava me ouvindo com uma atenção que eu senti mais do\nque vi — não estava olhando pra mim com o olhar de quem\nespera a próxima coisa a dizer. Estava apenas ouvindo.\n\n— Como é a fazenda? — ele disse.\nE eu contei.\nNão tudo de uma vez, não com nenhuma narrativa\norganizada. Contei em pedaços, da forma que as memórias\nmais importantes saem — o cheiro da terra de manhã cedo, a\ncor específica do barro depois da chuva, o portão de madeira\nque rangia do jeito certo, o som do vento passando pelo\ncampo de uma forma que a Valdris, com toda a sua magia,\nnunca havia conseguido reproduzir.\nContei sobre os quadriciclos na lama.\nSobre acordar antes do sol.\nSobre a simplicidade de um lugar que não precisa de\nnenhuma magia para ser extraordinário.\nIan ouviu tudo.\nE quando eu parei, não foi porque havia terminado — foi\nporque percebi, de repente, que havia falado mais sobre a\nfazenda do que havia falado com qualquer pessoa desde que\nhavia chegado à Valdris.\n— Desculpa — eu disse. — Eu raramente falo sobre isso.\n— Eu sei — ele disse.\n— Como você sabe?\nEle olhou pro jardim por um segundo.\n— Porque você guarda as coisas que importam — ele disse.\n— É possível notar.\n\nO jardim cheirava àquela coisa boa sem nome.\nDentro do salão, o festival continuava.\nFicamos ali por mais alguns minutos, em silêncio, antes de\nentrar.\nE o silêncio foi, pela primeira vez, completamente\nconfortável.\n●\nÀ noite, no quarto, a Lisa perguntou como havia sido o dia.\n— Normal — eu disse.\nEla me olhou.\n— Você está sorrindo pro teto.\n— Estou descansando.\n— As pessoas que estão descansando geralmente não sorriem\npro teto com essa expressão específica.\n— Qual expressão?\n— A de quem está revivendo alguma coisa boa.\nEu me virei de lado, de costas pra ela.\n— Boa noite, Lisa.\n— Serena.\n— Lisa.\n\n— O mingau de quarta é amanhã.\n— Não vou comer.\n— Vai.\nEu não respondi.\nEla estava certa.\nMas essa era uma informação que eu mantive apenas comigo\npor aquela noite."}, {"id": "cap8", "title": "As coisas que ninguém conta", "text": "As coisas que ninguém conta\nHá uma coisa sobre confiar que ninguém te explica direito.\nAs pessoas falam sobre confiar como se fosse uma decisão.\nComo se você pudesse acordar numa manhã e dizer: hoje eu\ndecido confiar, e aí a coisa simplesmente acontecesse. Como\nse fosse um interruptor. Liga, desliga.\nNão é.\nÉ mais parecido com aquela semente que eu aprendi na aula\nda professora Vael. Você não decide quando ela germina.\nVocê só pode preparar o terreno, criar as condições, e então\nesperar que ela saiba a hora certa.\nEu aprendi isso sobre mim cedo. Sou difícil de entrar. Não de\npropósito — nunca foi estratégia ou orgulho. É simplesmente\ncomo funciono. Há poucas pessoas no mundo com acesso ao\nque está dentro, porque eu só abro essa porta devagar, com\ncuidado, para quem demonstra ao longo do tempo que vai\ntratar bem o que encontrar lá.\nE mesmo assim, às vezes, tenho medo.\n●\nHavia uma festa naquela semana.\nNão era evento oficial da Valdris — era o tipo de festa que\nacontece porque um grupo grande de estudantes decide\nsimultaneamente que precisa de uma quinta-feira diferente e\nalguém tem acesso a um salão que não está sendo usado. A\nGuilda da Chama havia encontrado um espaço na ala leste\n\nque ficava liberado nas quintas e que tinha o teto alto o\nsuficiente para a música não bater de volta.\nEu não tinha intenção de ir.\nA Lisa tinha intenção de ir e havia comunicado que eu estava\nindo junto, que eram coi
