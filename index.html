sas diferentes mas que na prática\nresultavam no mesmo.\nEu fui.\n●\nO salão da Guilda da Chama era barulhento do jeito que festas\nsão barulhentas quando a acústica não foi projetada para isso\n— a música chegava de todos os lados ao mesmo tempo e\nhavia um ponto específico perto da coluna central onde dois\nsons diferentes se encontravam e criavam um terceiro som\nque não existia nas fontes originais.\nEu fiquei perto dessa coluna por um tempo, com uma bebida\nque a Lisa havia me passado, observando.\nNão por timidez, dessa vez. Mais por esse costume antigo de\nentender o espaço antes de me mover nele. Aprendi isso na\nfazenda também — você não entra num campo que não\nconhece sem primeiro checar onde estão as cercas.\nO Theo apareceu do meu lado com expressão de homem em\nmissão científica.\n— O grifo mecânico passou pelo corredor leste hoje — ele\ndisse, sem preâmbulo. — Fora do horário de torneios.\n— Theo, é quinta à noite.\n\n— A ciência não tem horário.\n— O grifo tem.\n— Aparentemente não. — Ele abriu o caderno. — Estava sem\nnenhum estudante na área. Apenas circulou o corredor duas\nvezes e voltou pra baia.\nEu tomei um gole da bebida.\n— O que você acha que significa?\n— Patrulhamento territorial. Ou — ele fechou o caderno com\numa expressão de quem guarda a melhor teoria pro final —\nconsciência emergente que produz comportamento\nindependente dos protocolos originais.\n— Você e o Ian com consciência emergente.\n— Ian me deu o dado. Ele estava passando pelo corredor\nquando viu.\nOlhei pro Theo.\n— Ele estava passando pelo corredor leste a que horas?\nO Theo abriu o caderno de novo.\n— Dezoito e quarenta.\nDezoito e quarenta era o horário em que eu terminava a\nreunião semanal da Sociedade Atlética.\nA reunião que sempre acontecia no salão norte.\nQue ficava no corredor leste.\n\nFiquei olhando pro Theo por um segundo.\n— Ele passa por lá toda semana? — eu disse.\n— Só estou relatando os dados — disse o Theo, com uma\ninocência que era completamente falsa.\n●\nIan apareceu mais tarde.\nNão sozinho — com dois colegas do time de Movimento que\neu conhecia de vista. Mas em determinado momento o grupo\nse dispersou pela festa e nós dois acabamos, por aquela física\nde festa que ninguém controla completamente, num canto\nmais quieto perto das janelas.\n— Você estava no corredor leste hoje — eu disse,\ndiretamente.\nEle não pareceu surpreso com a pergunta.\n— Estava — ele disse.\n— No horário da minha reunião.\n— Pode ser.\n— Theo me deu os dados.\n— Theo e os seus dados. — Ele inclinou levemente a cabeça.\n— Eu passo por lá às vezes.\n— Toda semana é mais do que às vezes.\nEle me olhou por um segundo.\n\nE então, em vez de desviar — o que eu esperava, porque\ndesviava seria mais fácil — ele disse:\n— Gosto de cruzar com você quando você sai da reunião.\nSimples. Sem embrulho.\nEu não soube o que fazer com aquilo por um momento\ninteiro.\n— Por quê? — eu disse.\n— Porque você sai sempre pensando em alguma coisa — ele\ndisse. — Às vezes está sorrindo um pouco sem perceber. Às\nvezes com aquela testa franzida de orçamento errado. —\nPausa. — É um dos melhores dois minutos da minha semana.\nHavia tanto naquilo para processar que eu escolhi processar\napenas o mais seguro:\n— Dois minutos é muita especificidade.\n— É o tempo do corredor leste até a bifurcação.\n— Você calculou.\n— Empiricamente — ele disse, com o tom de quem entregou\na linha pro Theo sem perceber.\nEu quase ri. Não deixei, mas quase.\n— Ian — eu disse.\n— Serena — ele disse.\n— Isso é levemente absurdo.\n\n— Provavelmente — ele concordou, sem nenhum sinal de\narrependimento.\nA festa continuava ao redor de nós. Alguém havia ativado um\nfeitiço de luz que produzia espirais douradas perto do teto, e\nelas circulavam devagar como se tivessem tempo.\nFiquei olhando pra elas por um segundo.\n— Você sabe que é complicado — eu disse, eventualmente.\nCom mais honestidade do que eu havia planejado trazer pra\naquela noite.\n— Sei — ele disse.\n— Não sou fácil de conhecer.\n— Eu sei disso também.\n— Eu demoro.\n— Eu tenho tempo — ele disse. E havia algo na forma como\nele disse — não impaciente, não performático, apenas\npresente — que chegou num lugar dentro de mim que eu não\nestava com a guarda levantada o suficiente pra proteger.\nFiquei quieta.\nAs espirais douradas circulavam.\n— Por que você foi me contar da vespa? — eu disse, de\nrepente.\nEle piscou. Não esperava essa.\n— O que?\n\n— No festival de primavera. Você me levou até aquele\ncorredor pra me mostrar a vespa de luz. Por quê foi me buscar\nespecificamente?\nEle ficou quieto por um momento.\nNão o silêncio de quem não sabe a resposta. O silêncio de\nquem está decidindo se vai dizer.\n— Porque quando o feitiço foi naquele ponto — ele disse,\ndevagar — eu soube que era um rastro seu. E pareceu errado\nnão te contar que você havia deixado algo naquele corredor.\nMesmo que fosse só luz. Mesmo que fosse temporário.\nOlhei pra ele.\n— Que você tinha estado ali — ele continuou — e que havia\nficado alguma coisa.\nEra a coisa mais bonita que alguém havia me dito de um jeito\nque não tentava ser bonito.\nNão era declaração. Não era promessa. Era só a verdade de\ncomo ele havia pensado naquele momento específico.\nEu engoli aquilo.\n●\nMais tarde, saímos da festa um pouco antes do grupo.\nNão combinado — apenas aconteceu que os dois tínhamos\nchegado no limite de barulho e música que o corpo tolera\nantes de precisar de ar, e saímos na mesma direção sem\ndiscutir.\n\nO corredor fora do salão era quieto. As tochas da madrugada,\nque eram diferentes das tochas do dia — mais baixas, mais\namarelas, com aquele tremor lento que o castelo mantinha\ncomo se estivesse respirando.\nAndamos devagar.\nNão falamos sobre nada importante por um tempo. Sobre a\nteoria do Theo. Sobre o festival. Sobre uma aula de Magia\nNatural que havia corrido mal naquela semana por motivos\nque eu ainda estava processando. Sobre o fato de que o grifo\nmecânico havia, na semana anterior, claramente perseguido\ntrês estudantes de verde com mais entusiasmo do que os\noutros, o que o Theo considerava dado e o resto do mundo\nconsiderava coincidência.\nE então, no corredor que levava à ala norte onde ficavam os\nquartos das estudantes, Ian parou.\nEu parei também.\n— Posso te dizer uma coisa? — ele disse.\n— Você perguntou isso da última vez — eu disse. — Antes\nde contar da fazenda.\n— E você respondeu.\n— E eu respondi.\nEle me olhou com aquela expressão que eu havia aprendido\na reconhecer — a versão dele de estou prestes a ser honesto\nde um jeito que não sei se vai ser bem recebido.\n— Eu sei que você é cautelosa — ele disse. — E eu entendo.\nNão estou pedindo que você não seja. Só quero que você\n\nsaiba que eu não estou com pressa. — Pausa. — Que qualquer\nritmo que fizer sentido pra você faz sentido pra mim também.\nFiquei olhando pra ele.\n— Por que você está me dizendo isso agora?\n— Porque você disse que é complicado. E eu quero que você\nsaiba que complicado não é problema.\nHavia um tremor pequeno no interior do meu peito. Não de\nmedo. Era diferente de medo — era o tipo de coisa que\nacontece quando alguém chega perto demais de algo que você\nprotege há muito tempo e, em vez de bater na porta,\nsimplesmente espera do lado de fora sem exigir nada.\n— Ian — eu disse.\n— Hm.\n— O óculos ainda não existe.\nEle riu.\nAquela risada pequena, involuntária, a que eu havia\naprendido a gostar mais do que queria admitir.\n— Eu sei que você diz isso — ele disse.\n— Eu digo porque é verdade.\n— Eu sei que você acredita nisso.\n— Ian.\n— Serena.\n\nFicamos nos olhando por um segundo.\nE então, antes que qualquer um dos dois fizesse alguma coisa,\nas tochas do corredor tremeluzaram — como faziam às vezes,\nquando o vento passava por alguma abertura que o castelo\nmantinha secreta — e por um segundo toda a ala ficou\nnaquela meia-luz âmbar que tornava tudo levemente diferente\ndo que era.\nA Valdris e os seus momentos com opinião própria.\n— Boa noite — eu disse.\n— Boa noite, Serena — ele disse.\nVirei e fui pro meu quarto.\nNão olhei pra trás.\nMas ouvi os passos dele se afastando devagar, sem pressa,\nexatamente como havia prometido.\n●\nAquela noite eu fiquei acordada até mais tarde do que o\nnormal, o que é dizer algo.\nNão pensando, exatamente. Mais sentindo. Como se\nhouvesse algo se reorganizando dentro de mim lentamente,\ncomo terra depois de chuva — que absorveu o que precisava\nabsorver e agora está quieta, processando.\nÀs duas e quarenta e três da manhã — eu sei o horário porque\nolhei pro relógio com a atenção de alguém que está tentando\nentender onde foi parar — peguei o MagicPad.\n\nNão postei nada.\nSó abri a conversa com ele. Olhei pro nome. Fechei.\nE então, num impulso que me surpreendeu antes de me\nconvencer de que era a decisão certa, abri de novo e escrevi:\n\"Obrigada pelo corredor leste.\"\nMandei antes de pensar demais.\nA resposta chegou em menos de dois minutos.\n\"Vai ficar só no obrigada?\"\nEu sorri.\nDo tipo que sai antes da decisão.\nE escrevi de volta:\n\"Por enquanto.\"\nFechei o MagicPad.\nOlhei pro teto de pedra.\nA fazenda estava longe.\nO Trovão estava longe.\nO portão de madeira que rangia certo estava longe.\nMas havia algo naquele quarto, naquela madrugada, que era\nnovo e era bom e era meu de um jeito diferente de qualquer\ncoisa que eu havia trazido de lá.\n\nE eu não estava com pressa.\nNenhum de nós dois estava."}, {"id": "cap9", "title": "O dia em que o vento respondeu", "text": "O dia em que o vento respondeu\nExiste uma competição na Valdris chamada Confronto das\nCasas.\nNão é torneio oficial — não tem comissão julgadora, não tem\nestandartes das delegações diplomáticas, não tem grifo\nmecânico perseguindo ninguém com entusiasmo\ndesproporcional. É mais simples do que isso, e talvez por isso\nseja mais honesto: uma vez por semestre, a Valdris convida\noutra academia para um dia inteiro de provas mágicas\ncombinadas — duelos de elemento, corridas de vento,\ncombate com invocação controlada — e os dois grupos se\nencontram no campo aberto atrás das torres sul para descobrir\no que acontece quando magias de escolas diferentes se\nencontram no mesmo espaço.\nEra menos sobre vencer do que sobre ver.\nMas ninguém admitia isso em voz alta.\n●\nA academia convidada naquele semestre era a Erevan — uma\nescola mais nova que a Valdris, construída numa cidade\nportuária a dois dias de viagem, com especialização em\nMagia de Vento e Correntes. Os estudantes de Erevan tinham\nreputação de serem rápidos, imprecisos e completamente sem\nmedo de consequências, o que a professora Vael descrevia\ncomo filosofia pedagógica questionável e que o Theo\ndescrevia como interessante do ponto de vista da coleta de\ndados.\nO dia do Confronto era num sábado de novembro.\n\nCéu limpo. Vento vindo do leste, que o Theo havia calculado\nser bom presságio para a Valdris e mau presságio para\nErevan, com base numa teoria que ele mesmo admitia estar\nainda em fase preliminar.\n●\nEu não tinha intenção de assistir.\nIsso é importante de estabelecer: eu não havia planejado estar\nnaquele campo. Tinha um relatório da Sociedade Atlética\npara terminar, uma leitura de Magia Natural que havia adiado\ndois dias, e a teoria razoável de que ficar no meu quarto era\numa decisão saudável para alguém que havia dormido quatro\nhoras na noite anterior porque ficara acordada até as três\npensando em mensagens que havia mandado e em como\naquela segunda mensagem havia chegado em menos de dois\nminutos.\nMas então a Lisa apareceu na porta com o casaco de lã preta\nque ela só usa quando está determinada a arrastar alguém pra\nfora, e disse:\n— O Ian joga hoje.\n— Eu sei — eu disse.\n— Você vai assistir.\n— Eu tenho trabalho.\n— Você tem trabalho todo dia. Hoje tem Ian no campo aberto\ncom céu de novembro.\nEu olhei pro relatório.\n\nO relatório olhou de volta sem nenhuma opinião útil.\n●\nO campo atrás das torres sul era maior do que parecia de\ndentro do castelo.\nAberto de um jeito que a Valdris raramente era — sem teto\nde pedra, sem corredores com opiniões próprias, sem a\nsensação constante de que as paredes estavam ouvindo.\nApenas grama, céu, e o vento de maio que chegava do leste\nsem pedir licença e fazia todos os estandartes apontarem na\nmesma direção ao mesmo tempo.\nHavia arquibancadas montadas nas laterais. Não muitas — o\nConfronto das Casas era evento interno, sem pompa de\nfestival — mas suficientes para os estudantes que haviam\ntrocado a tarde de sábado por algo que valesse a pena assistir.\nEu me sentei no meio, com Lisa de um lado e Theo do outro,\ncom o relatório dobrado na bolsa porque havia trazido com a\nintenção de trabalhar entre as provas e sabia que não ia\ntrabalhar.\nOs competidores de Erevan usavam preto com detalhes\nlaranja e tinham, de fato, aquele jeito de quem não pensa\nmuito antes de tentar.\nOs competidores da Valdris usavam o vinho-escuro padrão\nda academia.\nIan estava entre eles.\nEu não o procurei na lista de competidores antes de chegar.\nEle simplesmente estava lá quando eu olhei pro campo, e\n\nhavia algo levemente inconveniente em perceber que meus\nolhos o encontraram antes que eu tivesse decidido procurar.\n●\nA primeira prova era Duelo de Elemento — dois\ncompetidores, um de cada academia, num espaço delimitado,\nusando magia defensiva e ofensiva controlada. A ideia era\ndemonstrar técnica, não força bruta, mas o Theo havia me\navisado que esse equilíbrio dependia muito de quem estava\njulgando.\nIan entrou na segunda rodada.\nContra uma garota de Erevan que era, visivelmente, rápida.\nMuito rápida — do tipo que movimenta antes de decidir, que\nconfia no instinto mais do que na técnica, que produz magia\nde Vento em explosões curtas e imprevisíveis.\nO Theo abriu o caderno com a expressão de um naturalista\ndiante de uma espécie rara.\nO duelo começou.\nErevan atacou primeiro — uma rajada de vento concentrado\nque chegou rápida e baixa, o tipo de coisa que esperava pegar\nalguém desprevenido na primeira movimentação. A maioria\ndos competidores recuaria. Ou bloquearia com escudo.\nIan não fez nenhuma das duas coisas.\nEle se moveu lateralmente com aquela fluidez específica que\neu havia visto no torneio de primavera — menos esquiva,\nmais dança — e deixou a rajada passar por onde ele havia\nestado meio segundo antes. Depois estendeu a mão para o\nlado e fez algo que eu precisei de um segundo para entender:\n\ncapturou o feitiço de vento no meio do caminho,\nredirecionou-o numa curva fechada usando a própria Magia\nde Movimento como eixo, e devolveu para Erevan com um\nângulo diferente do esperado.\nO campo ficou quieto por um segundo.\nDepois o Theo disse, com a voz de quem está verificando uma\nhipótese:\n— Absorção cinética adaptada. Eu sabia.\n— Você não sabia — eu disse.\n— Suspeitava. Que é quase a mesma coisa.\n●\nA segunda prova foi Corrida de Vento — cinco competidores\nde cada lado, num percurso que incluía obstáculos de magia\nconjunta que mudavam de posição durante a prova.\nIan não participou dessa.\nIsso significou que, pela primeira vez naquela tarde, eu tive\natenção disponível para observar outra coisa.\nE a outra coisa era que a Serena de Erevan — não havia\nnenhuma Serena de Erevan, mas havia uma estudante de\nterceiro ano da academia visitante que havia chegado mais\ncedo para observar o campo e que havia ficado nas\narquibancadas com um grupo pequeno de colegas — estava\nusando uma combinação de feitiços de Magia de Vento que\neu reconheci como sendo da mesma família teórica que eu\nestudava em Magia Natural.\n\nEu não pude deixar de notar.\nPorque as duas coisas — vento e terra, ar e solo — eram\ndiferentes faces do mesmo princípio: trabalhar com o ritmo\nnatural das coisas em vez de tentar impor o seu próprio ritmo.\nFiquei pensando nisso mais do que no percurso da corrida.\n●\nA terceira prova era a maior.\nCombate com Invocação Controlada.\nO nome era tecnicamente preciso e completamente enganoso\nsobre o que acontecia na prática: quatro competidores de cada\nlado, num campo que incluía feitiços de terreno ativos, e a\npossibilidade — controlada pela equipe de segurança da\nValdris, mas possibilidade assim mesmo — de invocar\nelementos externos.\nNaquele campo específico, naquele semestre específico, o\nelemento externo disponível era um Grifo de Tempestade.\nNão o mecânico. O de verdade.\nO Theo fechou o caderno.\n— Isso — ele disse, com uma solenidade que raramente\ndemonstrava fora de experimentos alquímicos de alta\ncomplexidade — vai ser importante.\n●\nO Grifo de Tempestade era mantido no ateliê de invocação\nda Valdris durante o ano inteiro e liberado apenas pra\n\ndemonstrações controladas e para o Confronto das Casas. Era\nmaior que o mecânico, silencioso de um jeito que o mecânico\nnão era, e tinha a característica específica de sentir magia\nemocional — feitiços que carregavam intenção forte geravam\nnele uma reação que a equipe de invocação descrevia como\nresponsividade e que os estudantes descreviam como ele sabe\no que você está pensando.\nApareceu no campo quando a terceira prova começou e ficou\nparado na lateral como um árbitro com asas, observando tudo\ncom aqueles olhos dourados que não piscavam no ritmo\nnormal.\nIan estava nessa prova.\nEu, sentada nas arquibancadas, percebi que havia parado de\nrespirar normalmente.\n●\nA prova foi, objetivamente, caótica.\nNão de um jeito ruim — do jeito que as coisas ficam quando\nhá muita magia num espaço pequeno e os competidores são\nbons o suficiente para criar situações que ninguém havia\nespecificamente planejado. Os de Erevan eram rápidos e\nimprevisíveis, como esperado. Os da Valdris eram mais\nsólidos, mais estruturados, mais difíceis de surpreender.\nNo trecho final da prova, com a pontuação empatada e dois\nminutos restantes, um dos competidores de Erevan invocou\numa corrente de fogo horizontal que cruzou o campo inteiro\n— um feitiço que era, na teoria, fora das regras de invocação\ncontrolada, mas que havia chegado rápido o suficiente para\nque a equipe de segurança não tivesse agido antes.\n\nA corrente de fogo pegou dois competidores da Valdris de\nsurpresa.\nIan foi um deles.\nEle caiu.\nNão muito — foi mais de raspão, fazendo ele cair e que\ntransformou em rolamento, a Magia de Movimento entrando\nautomaticamente como reflexo — mas caiu, e havia algo de\ndiferente quando levantou: um jeito levemente cuidadoso de\napoiar o joelho esquerdo que eu reconheci como dor antes\nque ele demonstrasse qualquer dor.\nO campo ficou quieto de um jeito diferente do anterior.\n— Ele está bem — disse a Lisa, com a voz de quem está\ndizendo isso tanto pra mim quanto pra si mesma.\nEu não disse nada.\nEu estava olhando pro joelho.\n●\nO que aconteceu nos próximos noventa segundos eu só\nconseguiria descrever depois, e mesmo assim de forma\nincompleta.\nIan levantou.\nCom o joelho com dor, no campo, a um minuto e meio do fim\nda prova, com a equipe de segurança começando a se mover\nna direção dele.\nE então ele fez alguma coisa que eu não havia visto antes.\n\nNão foi Magia de Movimento.\nFoi outra coisa. Mais lenta. Mais profunda. Do tipo que\nacontece quando alguém para de lutar contra a situação e\ncomeça a trabalhar com ela — exatamente o princípio que eu\nhavia aprendido na aula da professora Vael sobre semente e\ntempo e coisas que não aceitam pressa.\nEle fechou as mãos.\nE começou a trabalhar o vento.\nNão como Erevan fazia — em explosões rápidas e\nimprevisíveis. Mais devagar. Em camadas. Como quem está\nconstruindo alguma coisa em vez de destruindo.\nO vento que chegava do leste — aquele mesmo vento de\nnovembro que havia feito todos os estandartes apontarem na\nmesma direção — começou a mudar de comportamento.\nNão de direção. De textura. Como se houvesse algo\norganizando o ar em padrões que não eram aleatórios.\nO Grifo de Tempestade, na lateral do campo, levantou a\ncabeça.\nE então o vento se abriu.\nEssa é a única forma que encontro para descrever: se abriu.\nComo quando você está dentro de uma nuvem densa e ela se\nsepara de repente, e o que aparece não é sol nem tempestade\n— é apenas espaço, e luz, e a sensação de que o mundo é\nmaior do que parecia um segundo antes.\nO feitiço de Erevan se desfez dentro daquilo.\n\nNão com violência. Simplesmente perdeu coesão, como uma\ncorrente que encontra água parada e esquece o sentido de\ncorrer.\nO campo ficou completamente quieto.\nO Theo levantou devagar, com a expressão de quem está\ntendo um momento formativo.\n— Ressonância de Vento Expansiva — ele disse, com uma\nreverência que raramente demonstrava por nada. — Eu\nprecisaria de um semestre inteiro só pra mapear o que ele\nacabou de fazer.\nEu não disse nada.\nPorque havia algo naquilo — naquela magia feita de\npaciência em vez de força, de trabalho com o ritmo das coisas\nem vez de contra elas — que eu conhecia.\nNão da Magia de Movimento.\nDa fazenda.\nDo Trovão.\nDe tudo que eu havia tentado explicar para ele naquele\ncorredor do festival, com o jardim cheirando a algo sem\nnome.\nEle havia feito aquilo com o vento.\nE eu não sabia se havia sido intencional ou não.\nMas havia ficado parecendo meu.\n\n•\nA prova terminou empatada.\nA pontuação geral do Confronto ficou empatada também, o\nque a equipe da Valdris descreveu como resultado honesto e\na equipe de Erevan descreveu como resultado\ninesperadamente honesto, que era diferente mas que todos\ndecidiram aceitar.\nIan foi avaliado pela enfermeira Dora, que confirmou\ncontusão no joelho, nada sério, e o mandou embora com uma\nbandagem e uma expressão que era a mesma que havia dado\na mim quando eu havia chegado com a muleta — a expressão\nde estudante de magia que podia ter sido mais cuidadoso e\nque ela havia visto versões desse cenário mais vezes do que\nconseguia contar.\nEle andou saindo do campo com uma leve dor que claramente\nestava tentando minimizar.\nO Theo já tinha três páginas de anotações.\nA Lisa estava me olhando com aquela expressão.\n●\nEncontrei Ian no corredor da ala leste, mais tarde, quando o\ncampo já havia esvaziado e o castelo havia voltado ao ritmo\nnormal de fim de tarde.\nEle estava andando devagar, com a bandagem visível abaixo\nda barra da calça, e havia algo diferente no jeito dele naquele\nmomento — menos a energia expansiva de sempre, mais o\ntipo de quietude que acontece depois que alguma coisa\nintensa terminou.\n\n— O joelho — eu disse.\nEle me viu e fez aquela expressão específica de alguém que\nestava esperando que ninguém tivesse notado.\n— Está bem.\n— Parece bem.\n— Dora disse que é contusão.\n— Eu sei. Eu ouvi.\nEle me olhou.\n— Você estava prestando atenção no campo.\nNão foi acusação. Era observação, da mesma forma que ele\nsempre observava.\n— Estava trabalhando no meu relatório — eu disse.\n— Com o relatório na bolsa sem abrir.\n— Eu abri na corrida de vento.\n— Você leu alguma coisa?\nPausa.\n— Não.\nEle riu — aquela risada pequena, involuntária — e havia algo\nno som dela que me tranquilizou de um jeito que eu não havia\npercebido que precisava.\nAndamos juntos pelo corredor por um momento.\n\n— O que foi aquilo? — eu disse, eventualmente. — No final.\nO vento.\nEle ficou quieto por um segundo.\n— Ressonância Expansiva — ele disse. — É uma aplicação\nde Movimento que a maioria dos professores não ensina\nporque exige um estado específico. Você precisa parar de\npensar no feitiço e começar a pensar no que você quer que o\nespaço faça. É mais intenção do que técnica.\n— Você fez isso antes?\n— Uma vez. Em treino. Não com esse resultado.\n— O que foi diferente dessa vez?\nEle olhou pro corredor à frente.\nE então, com uma honestidade que eu já havia aprendido a\nreconhecer como a versão dele de estou dizendo algo que\nimporta:\n— Estava pensando na fazenda — ele disse. — No que você\ndisse sobre o vento de campo aberto. Como ele não pede\npermissão. Como não pertence a nenhum lugar. — Pausa. —\nPareceu certo usar isso como referência.\nEu parei de andar.\nEle continuou dois passos antes de perceber e virar.\n— Serena?\nHavia um tremor muito pequeno em algum lugar dentro de\nmim que eu não conseguia nomear com precisão. Não era\n\napenas emoção — era reconhecimento. Do tipo que acontece\nquando algo que você disse, numa conversa que parecia\npequena, se transforma em outra coisa nas mãos de outra\npessoa.\n— Você usou o vento da fazenda — eu disse.\n— Foi a melhor referência que eu tinha — ele disse,\nsimplesmente.\nO corredor estava quieto.\nAs tochas da tarde, que eram diferentes das da madrugada —\nmais largas, mais estáveis — projetavam aquela sombra\nlonga que o final de novembro produzia na Valdris.\n— O joelho vai ficar bem — eu disse, eventualmente.\n— Vai.\n— Mas você deveria usar o elevador de feitiço até segundafeira pelo menos.\n— Detesto o elevador de feitiço.\n— Eu sei. Use assim mesmo.\nEle me olhou com aquela expressão.\n— Isso foi uma recomendação médica?\n— Foi uma recomendação de alguém que também ficou de\nmuleta e ignora conselhos da Dora.\nEle riu de novo.\n\nE eu percebi, naquele corredor de fim de tarde, que havia\ncruzado os braços no peito num gesto que era menos defesa e\nmais contenção — do tipo que você faz quando há alguma\ncoisa dentro que você ainda não sabe bem onde colocar, mas\nque sabe que está lá e que é sua.\n— Ian — eu disse.\n— Hm.\n— Obrigada. Pela magia.\nEle ficou olhando pra mim por um segundo.\n— Você não precisa agradecer por isso.\n— Eu sei que não preciso.\nMas estava agradecendo assim mesmo.\nPorque algumas coisas merecem ser ditas em voz alta, mesmo\nquando não há palavras exatas.\n●\nÀquela noite, no quarto, com o relatório finalmente aberto na\nmesa, escrevi uma única linha no caderno de Magia Natural\nque ficava embaixo da pilha:\nRessonância Passiva: perceber sem interferir.\nRessonância Expansiva: usar o que você percebeu para criar\nespaço.\nFicaram ali, lado a lado, como dois princípios que de alguma\nforma descreviam a mesma coisa.\n\nOu pessoas.\nFechei o caderno.\nE decidi não pensar mais sobre isso naquela noite.\nNão funcionou."}, {"id": "cap10", "title": "Cavalos, barro e liberdade", "text": "Cavalos, barro e liberdade\nExiste algo que acontece com as pessoas quando estão longe\nde casa por tempo suficiente.\nNão é que elas esquecem. É mais sutil do que isso: elas\naprendem a funcionar sem. Como um músculo que foi\nimobilizado por semanas — ainda lá, ainda funcional, mas\natrofiado de um jeito que você só percebe quando tenta usálo de verdade.\nEu havia aprendido a funcionar sem a fazenda.\nO que não é a mesma coisa que não precisar dela.\n●\nO semestre estava chegando ao fim.\nProvas finais, relatórios de estágio, a prestação de contas\nanual da Sociedade Atlética que eu havia prometido a mim\nmesma que este ano terminaria antes do dia anterior ao prazo\ne que claramente não terminaria antes do dia anterior ao\nprazo. A professora Vael havia anunciado que a avaliação\nfinal de Magia Natural incluiria uma demonstração prática —\nnão de feitiços específicos, mas de intenção, de entendimento\ndos princípios — e eu sabia que essa era a prova que mais\nimportava pra mim e, por isso, a que mais me deixava\nnervosa.\nA Valdris em época de provas era um lugar diferente. Mais\nquieto nos corredores, mais barulhento nas bibliotecas. O\nquarto andar, que normalmente era o andar mais tranquilo,\ntornava-se caótico porque a biblioteca subterrânea ficava\n\nlotada e os estudantes transbordavam para os corredores de\ncima, sentados nas paredes com cadernos e bebidas\nencantadas que prometiam manter o foco mas que tinham o\nefeito colateral documentado de deixar as pessoas levemente\nhiperativas às duas da manhã.\nEu sabia disso empiricamente porque havia bebido uma na\nterça-feira e ainda estava acordada às quatro.\n●\nFoi numa quinta-feira, dois dias antes das provas começarem,\nque Ian apareceu na minha mesa da biblioteca com uma\nexpressão que eu havia aprendido a reconhecer como tenho\numa ideia que você provavelmente vai recusar.\n— Não — eu disse, sem levantar os olhos do caderno.\n— Você não sabe o que eu vou dizer.\n— Você tem aquela expressão.\n— Que expressão?\n— A de ideia que eu vou recusar.\nEle sentou na cadeira do lado.\n— Existe um lugar fora dos muros da Valdris — ele disse,\ncom a paciência de quem havia decidido que ia dizer de\nqualquer jeito — que a maioria dos estudantes não conhece\nporque fica a quarenta minutos a pé pela trilha leste. Mas que\nvale os quarenta minutos.\nEu finalmente levantei os olhos.\n\n— Você quer me levar pra um lugar desconhecido a quarenta\nminutos de caminhada dois dias antes das provas finais.\n— Quarenta minutos é nada. E você precisa sair desse castelo\npor algumas horas.\n— Eu estou estudando.\n— Você está olhando pro mesmo parágrafo faz vinte minutos.\nEu estava te observando desde que cheguei.\nPausa.\n— Por quanto tempo você estava me observando?\n— Tempo suficiente pra perceber que você não virou a página\nnenhuma vez.\nEu olhei pro caderno. A página estava na mesma posição que\nquando havia chegado.\n— Isso é invasão de privacidade acadêmica — eu disse.\n— Isso é preocupação com uma colega de academia.\n— Ian.\n— Serena. Você está com aquela testa franzida de cansaço\nreal, não de orçamento errado. São coisas diferentes.\nHavia algo levemente irritante em ser lida com essa precisão.\nE algo que não era irritante de jeito nenhum.\n●\n\nO lugar ficava, de fato, a quarenta minutos pela trilha leste.\nA trilha leste saía pelos portões de serviço da Valdris — que\nficavam sempre destrancados porque eram usados pelos\nfornecedores e porque o castelo claramente não havia sido\nprojetado com segurança perimetral como prioridade — e\nsubia por um campo que ficava entre a floresta e as pedras\naltas do lado norte da montanha.\nEra novembro, então o campo estava naquela cor específica\nque novembro tem — nem verde nem marrom, mas alguma\ncoisa no meio, úmida e honesta. O vento era o mesmo que\nhavia entrado pelo campo do Confronto alguns dias antes,\nmas mais livre aqui, sem arquibancadas ou competidores para\ncontornar.\nEu andei com as mãos nos bolsos do casaco preto, com o\ncaderno na mochila que havia trazido com a intenção de\nestudar durante a caminhada e que havia colocado na mochila\nsabendo que não ia estudar.\nIan andava ao meu lado com aquele passo que tinha na Magia\nde Movimento — fluido, sem urgência, como se cada\nsuperfície fosse igualmente simples de navegar.\nO joelho estava melhor. Ele havia usado o elevador de feitiço\naté domingo, o que ele havia mencionado com a exatidão de\nquem estava entregando um relatório de conformidade.\n●\nO lugar era um campo aberto que terminava numa borda de\npedra baixa, de onde se via o vale inteiro que ficava embaixo\nda montanha — não a cidade da Valdris, que ficava do outro\nlado, mas o campo largo e aberto que não pertencia a ninguém\n\nespecífico e que tinha aquela qualidade de espaço que não\ntem destino declarado.\nHavia também, no canto direito do campo, algo que eu não\nesperava.\nCavalos.\nNão muitos — três, pastando na parte mais alta, pertencentes\na alguma fazenda do vale que usava aquele campo como\nextensão. Um preto, um castanho, um malhado.\nO malhado levantou a cabeça quando chegamos.\nFiquei parada por um segundo.\nHavia algo naquilo que chegou de um jeito que a Valdris\nnormalmente não chegava — direto, sem mediação, sem\nmagia ou corredor ou pedra antiga entre mim e a coisa. Era\napenas campo, e vento, e um cavalo malhado que havia\ndecidido me olhar com a curiosidade específica que cavalos\ntêm quando encontram alguém que reconhecem como\ncompatível.\n— O Trovão — eu disse, sem pensar.\n— Hm?\nEu me virei pra Ian.\n— Ele lembra o Trovão. Na cor.\nIan olhou pro cavalo.\n— O teimoso?\n\n— O próprio.\n— Você quer chegar perto?\nEu já estava caminhando antes de responder.\n●\nO cavalo deixou eu me aproximar.\nNão de imediato — houve um momento de avaliação mútua\nque reconheci de outros cavalos, de outras vezes, a\nnegociação silenciosa de quem sou eu e o que você quer aqui.\nMas ele ficou. E quando estendi a mão ele abaixou a cabeça\ndevagar, da forma que cavalos fazem quando decidem que\nvocê é confiável.\nFiquei lá por um tempo que perdi o controle de medir.\nIan ficou um pouco atrás. Não longe — próximo o suficiente\npara que eu soubesse que estava ali — mas com aquela\ncontenção específica de quem entende que há momentos nos\nquais a presença certa é a silenciosa.\nAprendi isso sobre ele gradualmente. Que ele sabia quando\nficar quieto. Que o silêncio dele não era ausência — era uma\nescolha ativa, como a de um estudante de Magia Natural que\ntrabalha com o ritmo das coisas em vez de tentar impor o\npróprio.\n— Eu não contei pra quase ninguém sobre o Trovão — eu\ndisse, eventualmente, ainda com a mão no pescoço do cavalo.\n— Não da forma que contei pra você.\n— Eu sei — ele disse.\n\n— Você guardou.\n— Guardo tudo que você conta.\nVirei.\nEle estava a três passos de distância, com as mãos no bolso,\nolhando pra mim com aquela expressão que havia parado de\ntentar esconder nas últimas semanas — a que dizia mais do\nque ele colocava em palavras.\n— Isso é muito — eu disse.\n— É.\n— Você sabe que eu ainda não sei direito o que fazer com\nisso.\n— Eu sei.\n— Não estou dizendo que é um problema.\n— Eu sei disso também.\nO vento passou entre nós sem pressa, do jeito que o vento\ndaquele campo passava — como se não tivesse para onde ir\nurgente e pudesse ficar por algum tempo.\n— Eu vou contar uma coisa — eu disse.\n\nEle esperou.\n— Quando eu me despedi da fazenda pra vir pra Valdris —\neu disse, mais devagar do que o habitual, do jeito que as\ncoisas saem quando você está construindo-as enquanto fala\n— eu abracei o Trovão por muito tempo. A minha mãe ficou\nme esperando pra me dar um abraço maior ainda, e eu ficava\nadiando porque se eu abraçasse ela de verdade eu sabia que\nia chorar e uma vez que eu chorasse ia ser mais difícil entrar\nno trem.\nPausa.\n— E então o meu pai, que não chora, que construiu cada pedra\ndaquela fazenda com as próprias mãos e que eu reconheço em\nmim mais do que qualquer outra pessoa no mundo, ficou\nparado na beira do portão. E quando eu finalmente passei por\nele, ele só disse: você sabe que pode voltar. Não precisa se\narrepender de nada pra cá.\nO cavalo bufou suavemente no meu ombro.\n— Esse foi o primeiro dia da minha vida em que eu entrei\nnum trem sabendo que estava indo pro lugar certo e deixando\npro lugar mais certo ainda.\nIan ficou quieto por um momento depois que eu parei.\n— Como é ele? — disse eventualmente. — O seu pai.\n— Construído — eu disse. — Como fazenda. Como chão de\nterra que não precisa de nenhuma explicação pra ser o que é.\n— Pausa. — Assustador no primeiro impacto.\nCompletamente diferente do que parece depois de conhecer.\n— Ele vai me assustar?\n\nOlhei pra ele.\nHavia algo na pergunta que era novo — não a pergunta em si,\nmas o fato de que ele havia chegado nela naturalmente, sem\nembrulho, como se a ideia de conhecer o meu pai já estivesse\ndentro da cabeça dele como coisa possível.\n— Sim — eu disse.\n— Isso é um aviso ou uma promessa?\n— As duas coisas.\nEle assentiu, com a seriedade tranquila de quem aceita um\ndesafio real.\n— Quando você estiver pronta — ele disse.\nNão quando você decidir. Quando você estiver pronta.\nA diferença era pequena.\nMas era a diferença inteira.\n●\nFicamos no campo por mais de uma hora.\nO sol foi descendo devagar atrás da linha das pedras altas do\nnorte e o vento foi esfriando no ritmo que novembro tem\nquando está levando as coisas pro inverno, sem pressa mas\nsem parar.\nFalamos sobre a avaliação de Magia Natural — sobre o que a\nprofessora Vael queria ver, sobre o princípio de intenção que\n\neu havia sublinhado no caderno três vezes sem conseguir\narticular completamente.\n— Você já sabe o que fazer — ele disse.\n— Não sei se vou conseguir demonstrar na prova.\n— Você fez uma semente de carvalho germinar em dois\nminutos no terceiro ano. A Vael disse satisfatório. — Ele me\nolhou. — Você sabe o que fazer. A questão não é técnica.\n— Então qual é?\n— É confiar que o que você faz naturalmente é o suficiente.\nSem tentar demais. — Pausa. — Você é melhor quando para\nde se vigiar.\nHavia algo ali que era mais do que comentário sobre a prova.\nE nós dois sabíamos disso.\nEu não disse nada por um momento.\nDepois disse:\n— Theo chamaria isso de Convergência.\n— Theo chama tudo de Convergência.\n— Porque funciona.\nIan olhou pro campo à frente.\nE então disse, com aquela honestidade simples que tinha\naprendido que era a versão mais verdadeira dele:\n\n— Quando você parar de se vigiar — ele disse — vai ser\nmuito.\nO vento passou de novo.\nO malhado havia ido se juntar aos outros dois no lado mais\nalto do campo.\nEu olhei pra eles por um segundo — três cavalos num campo\nde novembro, sem destino urgente, apenas existindo no lugar\nonde eram o que eram.\nE então olhei pro Ian.\n— Vamos voltar — eu disse.\n— Vamos.\nAndamos de volta pelos quarenta minutos da trilha leste com\no vento de costas, que era diferente de ter o vento de frente\n— mais simples, mais leve, como quando as coisas vão na\nmesma direção que você está indo sem que você precise lutar\ncontra elas.\nNo portão da Valdris, antes de entrar, eu parei por um\nsegundo.\nOlhei pro campo que estava ficando pra trás.\nE pensei numa coisa que havia escrito no caderno no primeiro\ndia na Valdris, numa noite de solidão com cheiro errado no\nar:\nEu vou chegar até o fim da minha vida sem olhar para trás e\npensar \"eu deveria ter tentado\".\n\nA fazenda estava longe.\nMas a frase que a fazenda tinha me dado estava ali, dentro,\nfirme como sempre.\nE ao lado dela, nova, sem nome ainda mas presente:\nA consciência de que às vezes tentar não é ir pra longe.\nÀs vezes é ficar."}, {"id": "cap11", "title": "O que significa confiar", "text": "O que significa confiar\nA Festa do Solstício de Inverno na Valdris era a última grande\ncelebração antes das férias.\nEra também a única festa do ano em que o castelo inteiro\ncolaborava — não metaforicamente, mas de verdade: as\nparedes exalavam um calor que não existia no restante do\nano, as tochas produziam uma luz dourada diferente da luz\ncomum, e havia um rumor antigo entre os estudantes de que\no quarto andar da biblioteca, no Solstício, abria uma\npassagem para uma ala que não existia no resto do tempo. O\nTheo havia tentado encontrar essa passagem em dois\nSolstícios consecutivos. Ainda estava tentando.\nA festa acontecia no salão grande da ala central — o salão\nque era usado para cerimônias formais e que uma vez por ano\nse lembrava de ser bonito de um jeito diferente, com aquelas\ntapeçarias antigas saindo das paredes laterais e os feitiços de\ntemperatura aquecendo o ar de um jeito que fazia a pedra do\ncastelo cheirar de forma diferente. Mais quente. Mais\nhabitada.\nEu havia prometido a mim mesma que iria por no máximo\nduas horas.\nEssa promessa durou até a Lisa aparecer no meu quarto às\noito da noite com dois copos de bebida encantada e a\nexpressão de quem não está aceitando discussão.\n●\nSoube da Mara no começo da noite.\n\nNão de propósito — soube do jeito que as coisas se sabe em\nfestas de castelo onde todo mundo conhece todo mundo, que\né quando alguém do grupo menciona de passagem, sem\nintenção de causar nada, e você absorve a informação antes\nde ter decidido se queria absorver.\nA Mara era do quinto ano. Especialização em Magia de Luz.\nLinda do jeito confiante de quem sabe que é linda, o que eu\nsabia ser diferente de mim mas não me ocupava de considerar\nem circunstâncias normais. Tinha ficado com Ian numa festa\nalgumas semanas antes das provas — o Theo havia\nmencionado isso com a inocência específica de quem estava\nconvicto de estar apenas relatando dados e que claramente\nnão estava apenas relatando dados.\n— Quando? — eu disse, com uma voz que eu havia esperado\nsoar neutra e que claramente não soou.\n— Semanas atrás — disse o Theo. — Antes do Confronto das\nCasas, acho.\nAntes do Confronto.\nAntes do campo.\nAntes da conversa sobre o pai.\nAntes de quando você estiver pronta.\nFiquei olhando pro copo por um segundo.\n— Ok — eu disse.\n— Serena — disse a Lisa.\n— Estou bem — eu disse.\n\nE eu estava, de um jeito que era difícil de explicar — não\nestava destroçada, não estava com raiva. Estava com aquela\nsensação específica de quando você descobre que havia\nconstruído algo numa fundação que não era tão sólida quanto\nparecia, e agora precisa decidir se o que construiu em cima\nainda vale a pena ou se era só uma ilusão conveniente.\nFui até a borda do salão.\nPeguei outro copo.\nE fiquei olhando pro jardim interno que ficava visível pelas\njanelas altas — o mesmo jardim de flores azuis do corredor\ndo festival, mas agora coberto pela primeira neve leve do\ninverno, que a Valdris produzia sempre no Solstício\nindependente do clima real lá fora.\nA neve encantada não tinha temperatura. Só aparência.\nAchei que isso dizia alguma coisa sobre a noite.\n●\nIan apareceu do lado da janela sem que eu tivesse percebido\nque ele estava se aproximando.\nAprendi a reconhecer o jeito que ele chegava — a energia que\nchegava antes do passo, a qualidade específica de presença\nque fazia o ar ao redor parecer ligeiramente diferente. Mas\nnaquela noite eu não estava prestando atenção nas minhas\npróprias percepções.\n— Serena.\nEu não me virei imediatamente.\n\n— Você falou com o Theo — ele disse. Não pergunta.\n— O Theo falou comigo.\nHavia uma diferença pequena entre as duas coisas que nós\ndois reconhecemos.\nEle ficou do lado da janela, a um metro de distância, com\naquela expressão que eu havia aprendido a reconhecer como\na versão dele de sei que errei e não vou tentar diminuir.\n— A Mara — ele disse.\n— Não precisa explicar.\n— Preciso.\nEu me virei finalmente.\nEle estava olhando pra mim com uma intensidade que não era\ndesconfortável — era honesta, do tipo que a maioria das\npessoas evita porque honestidade nesse grau requer ficar\nparado enquanto alguém vê o que está lá.\n— Naquela época — ele disse — eu havia mandado\nmensagem depois da festa da Guilda. Você não respondeu por\numa semana. Eu achei que havia lido o sinal errado. Que você\nestava sendo clara e eu estava escolhendo não ver.\n— Eu não estava sendo clara — eu disse.\n— Eu sei agora. Não sabia antes.\nFicou quieto por um segundo.\n\n— A Mara foi num momento em que eu havia decidido que\nera mais fácil parar de esperar por alguma coisa que\nprovavelmente não ia acontecer. — Pausa. — Foi um erro.\nNão porque ela fosse o problema. Porque já não era o que eu\nqueria, e eu sabia disso, e fiz assim mesmo.\nHavia algo na forma como ele disse aquilo — sem se\ndefender mais do que o necessário, sem empurrar a culpa pra\nnenhum lado — que era diferente de qualquer coisa que eu\nhavia ouvido de qualquer pessoa.\n— Por que você está me contando isso? — eu disse.\n— Porque você ficou sabendo e porque você merece a versão\nreal, não a versão editada.\nOlhei pro jardim por um momento.\nA neve encantada continuava caindo lá fora — silenciosa,\nperfeita, sem temperatura.\n— Eu também fui difícil de ler — eu disse, eventualmente.\n— Você foi — ele concordou, sem ressentimento.\n— Ainda sou.\n— Eu sei.\n— Ian.\n— Hm.\n— Você disse que tinha tempo.\n— Tenho.\n\n— Então use.\nFicamos nos olhando por um segundo — dois, três — num\nsilêncio que era diferente de todos os outros silêncios que\nhavíamos tido, porque esse carregava o peso do que havia\nsido dito e o espaço do que ainda não havia.\nE então a Lisa apareceu do lado dele.\nEla havia chegado de onde, eu não sabia. A Lisa tinha o dom\nde aparecer no momento exato em que era necessária e\ndesaparecer com a mesma eficiência.\n— Ian — ela disse, com uma clareza que não admitia\nambiguidade.\nEle se virou.\n— Lisa.\n— Você está apaixonado pela minha amiga desde o primeiro\nsemestre — ela disse. — Você ficou esperando ela ficar\npronta, que era o certo. Você cometeu um erro porque achou\nque ela havia te dado sinal de não. — Pausa, na qual ela me\nolhou brevemente com uma expressão de você também errou,\na gente conversa depois. — Os dois são idiotas de formas\ncomplementares. Mas estão aqui agora. E eu cansei de\nobservar essa história de longe.\nIan ficou olhando pra Lisa por um segundo.\n— Você está me mandando ir falar com ela.\n— Estou mandando você virar homem e ir atrás dela — disse\na Lisa, com uma precisão que só era possível vinda de alguém\n\nque havia esperado por esse momento tempo suficiente para\nensaiar a frase.\nEla se afastou com a dignidade de alguém que havia\ncumprido uma missão histórica.\nEu a olhei ir.\n— A Lisa — eu disse.\n— A Lisa — ele confirmou.\nFicamos em silêncio por meio segundo.\nE então Ian inclinou a cabeça levemente, da forma que fazia\nquando estava prestes a dizer algo que importava.\n— Posso te levar pra ver uma coisa? — ele disse.\nEu reconheci aquela frase.\nEra a mesma do corredor do festival de primavera. A vespa\nde luz. O começo de tudo.\n— Qual é a razão desta vez? — eu disse.\n— Não inventei nenhuma — ele disse. — Dessa vez é só\nporque eu quero.\n●\nEle me levou pelo corredor da ala leste, pelo mesmo caminho\nque havíamos feito meses antes, até o ateliê de Magia Natural\nque ficava fechado durante as festas.\nSó que dessa vez a porta estava entreaberta.\n\nE lá dentro — no mesmo ponto exato da maçaneta de ferro\n— havia uma vespa.\nNão a mesma. Diferente da primeira: maior, mais brilhante,\ncom aquela luz âmbar que pulsava num ritmo que não era\naleatório. Como se fosse respiração.\nEntrei devagar.\nO ateliê de Magia Natural cheirava a terra úmida e a alguma\ncoisa vegetal que eu nunca havia conseguido identificar — o\ncheiro que havia me feito escolher aquela especialização no\nsegundo semestre do primeiro ano, quando eu havia passado\npela porta pela primeira vez e pensado esse cheiro é familiar.\nA vespa pulsou quando me aproximei.\n— Ela ficou — eu disse.\n— Ficou — ele disse. — Faz semanas. Desde a festa do\nConfronto.\nOlhei pra ele.\n— Feitiços residuais não ficam semanas.\n— Esse ficou.\n— Por quê?\nEle estava de pé na entrada do ateliê, com as mãos no bolso,\nolhando pra vespa com aquela expressão de alguém que havia\ntido tempo de pensar nisso e havia chegado a uma conclusão.\n— O Theo tem uma teoria — ele disse.\n\n— O Theo sempre tem uma teoria.\n— Essa eu concordo. — Pausa. — Feitiços residuais se\ndissipam quando a intenção que os criou se resolve. Quando\na situação que gerou aquele ponto de energia se esgota de\nalguma forma.\n— E essa não se esgotou.\n— Não.\nA vespa pulsou novamente — mais forte dessa vez, como se\no ateliê inteiro houvesse percebido que estava sendo\nobservado.\n— Ian — eu disse.\n— Serena — ele disse.\n— Eu fui difícil.\n— Você foi você mesma. São coisas diferentes.\n— Às vezes são a mesma.\n— Às vezes — ele concordou. — Mas eu sabia disso desde o\ncomeço. E escolhi ficar assim mesmo.\nHavia algo naquilo que chegou num lugar dentro de mim que\neu havia protegido por muito tempo — não com má vontade,\nmas com a cautela de quem aprendeu que algumas partes\nprecisam de mais garantias antes de abrir.\nEle havia dito eu escolhi.\n\nNão eu aguentei. Não eu esperei que melhorasse. Escolheu,\ndeliberadamente, com consciência do que estava escolhendo.\n— Por que? — eu disse.\nEle me olhou por um segundo.\nE então disse, com aquela honestidade simples que eu havia\naprendido que era a versão mais verdadeira dele — sem\nembrulho, sem performance:\n— Porque desde o primeiro dia em que você entrou num\ncorredor e disse hm e foi embora — ele disse — eu sabia que\nvocê era o tipo de pessoa que ia ser tudo ou nada. Que não\nhavia meio caminho com você. E eu decidi que preferia tentar\no tudo a nunca saber o que era.\nO ateliê estava quieto.\nA neve encantada continuava lá fora.\nA vespa pulsou uma última vez, suavemente, como se\nestivesse satisfeita com alguma coisa.\nEu dei um passo.\nEle não recuou.\nE quando fiz a segunda metade da distância entre nós, ele me\nencontrou no meio — não com urgência, não com pressa, mas\ncom aquela qualidade de movimento que só existe quando\nalguém está fazendo exatamente o que decidiu que queria\nfazer.\nO beijo foi leve.\n\nDo tipo que começa devagar porque ambos sabem que têm\ntempo, e que carrega dentro dele todos os meses de não dito\n— a mensagem da meia-noite, o corredor da vespa, a escada\nestreita, os dois minutos do corredor leste, o vento da fazenda\nusado numa magia, o cavalo malhado que lembrava o Trovão.\nQuando afastamos, foi devagar.\nEle estava sorrindo — não o sorriso de arma padrão do início,\nnão o sorriso calculado que eu havia catalogado como\nferramenta. O sorriso que chegava antes de ele decidir se\nqueria que chegasse.\nEu estava sorrindo também.\n— O óculos — eu disse.\n— Ainda existe — ele disse.\n— Ainda não existe.\n— Serena.\n— Ian.\nFicamos nos olhando por um segundo.\nE então a vespa de luz, que havia pulsado durante todos\naqueles meses com uma paciência que só existia em coisas\nencantadas, ergueu voo devagar — circulou o ateliê uma vez,\npassou pela janela que estava entreaberta — e se dissipou no\nar frio da noite de Solstício.\nO Theo, que nós dois descobriríamos mais tarde havia ficado\nparado na entrada do corredor com o caderno aberto durante\ntodo esse tempo, anotou aquilo como a dissipação mais bem\n\ncronometrada que ele havia documentado em três anos de\npesquisa.\nEu nunca soube o que ele havia escrito sobre aquilo.\nMas eu sabia o que senti quando a vespa foi embora.\nEra exatamente como quando o vento para de uma vez — não\nsilêncio, não ausência. O tipo de quietude que acontece\ndepois que tudo o que precisava ser movido já foi."}, {"id": "cap12", "title": "O que fica depois da noite", "text": "O que fica depois da noite\nHouve um antes e um depois daquela noite.\nNão de um jeito dramático — nada explodiu, nenhum dragão\nsobrevoou as torres sul anunciando uma nova era, a\nprofessora Vael não parou a aula seguinte pra comentar sobre\no significado cósmico do evento. O castelo continuou\nrangendo quando o vento batia. O Davi continuou misturando\nas colunas da planilha. O quarto andar da biblioteca\ncontinuou movendo as prateleiras quando alguém tentava\nexplorar rápido demais.\nMas havia um antes e um depois assim mesmo.\nO antes era eu andando pelos corredores da Valdris com\naquela sensação de guardar alguma coisa que precisava de\nespaço separado do resto. O depois era eu andando pelos\nmesmos corredores com a consciência de que havia parado\nde guardar — não porque havia aberto tudo de uma vez, mas\nporque havia dado o primeiro passo na direção de uma porta\nque eu havia mantido fechada por muito tempo.\nEra suficiente pra fazer tudo parecer levemente diferente.\n●\nPassamos os dias seguintes numa espécie de calibração lenta.\nNão foi rápido — e eu era grata por isso. Ian havia dito que\ntinha tempo, e havia cumprido. Não chegou no dia seguinte\ncom expectativas formadas ou linguagem de casal\n\nestabelecido. Chegou da mesma forma que sempre chegava\n— com aquela energia que ocupava espaço sem pedir licença,\ncom a risada que chegava antes dele, com aquela atenção\nespecífica que eu havia catalogado como diferente meses\natrás e que agora entendia de um jeito mais completo.\nA diferença era que agora eu não precisava fingir que não\nnotava.\nE havia algo de exaustivo, descobri, em ter fingido por tanto\ntempo. Como quando você fica numa posição desconfortável\npor horas e só percebe o quanto estava desconfortável quando\nfinalmente muda.\n●\nFoi numa sexta-feira — com o castelo naquele estado\nespecífico de barulho contido que acontece quando trezentas\npessoas estão simultaneamente tentando terminar tudo antes\nde ir embora — que a Lisa e o Theo organizaram uma\ncelebração de fim de semestre no ateliê de Alquimia do Theo,\nque era o único espaço da Valdris que tinha tanto\nequipamento de aquecimento encantado quanto uma área de\ndescanso que o Theo havia montado ao longo de três anos\ncom a justificativa de que alquimistas precisavam de\nambientes confortáveis para pensar.\nÉramos seis pessoas num espaço projetado para quatro.\nEra exatamente o tipo de coisa que eu normalmente acharia\nsufocante.\nNão achei.\n\nHavia algo no modo como a noite foi se passando — devagar,\ncom conversas que não tinham urgência, com aquelas bebidas\nencantadas do Theo que ele experimentava nos outros sem\ncontar os ingredientes, com a luz amarela do ateliê criando\naquele ambiente específico de lugar que não tem horário —\nque me fez perceber que estava, genuinamente, bem.\nEm determinado momento Ian foi buscar mais alguma coisa\nna ala de armazenamento do Theo, e eu fiquei sentada no sofá\ncom a xícara nas mãos, ouvindo o Theo explicar pra Lisa por\nque a reação alquímica que ele havia usado na bebida era\ntecnicamente não-perigosa no sentido estrito do termo, o que\nera uma frase que continha pelo menos dois problemas de\nlógica mas que a Lisa estava aceitando com paciência.\nE eu me peguei sorrindo pro nada.\nPor nenhuma razão específica.\nSó porque estava lá, naquele ateliê aquecido, com pessoas\nque conhecia de verdade, no castelo que havia escolhido, e\nhavia alguém que havia dito eu escolhi — da mesma forma\nque eu havia escolhido a Valdris, a mesma forma que o meu\npai havia construído a fazenda, a mesma forma que o Trovão\nhavia me ensinado que algumas relações são sobre escolha\nrepetida e não sobre acidente.\nIan voltou e sentou do meu lado.\n— Você está sorrindo pro nada — ele disse, com a precisão\nde quem havia aprendido a ler aquela expressão específica.\n— Estava pensando — eu disse.\n— No quê?\n\n— Nas escolhas.\nEle me olhou.\n— As boas ou as ruins?\n— As que valem a pena.\nHavia algo na forma como ele ouviu aquilo — sem exigir que\neu explicasse mais, sem tentar completar o sentido por conta\nprópria — que foi a última coisa que eu precisei.\nNão de forma dramática.\nDe forma simples, como quando uma semente que você\nplantou finalmente aparece acima da terra e você percebe,\nsem surpresa mas com alegria, que funcionou.\nEu coloquei a xícara na mesa.\nE encostei a cabeça no ombro dele.\nFoi um gesto pequeno. Para alguém que me conhecesse de\nfora, talvez fosse invisível.\nMas para mim — que levava anos inteiros construindo\nparedes antes de deixar qualquer pessoa do lado de dentro —\nfoi enorme.\nIan ficou quieto por um segundo.\nE então a mão dele encontrou a minha, devagar, sem\nanunciar, do tipo que acontece quando dois ritmos finalmente\nencontram o mesmo compasso.\n\nO Theo, do outro lado do ateliê, escreveu alguma coisa no\ncaderno.\nA Lisa olhou pra nós e depois olhou pro teto com a expressão\nde alguém que havia esperado muito tempo por aquele\nmomento e que estava se permitindo a satisfação silenciosa\nde ter estado certa.\n●\nA noite foi tarde.\nE quando os outros foram saindo — o Theo para o quarto\nandar que ele insistia em usar como base de pesquisa mesmo\nsendo proibido após meia-noite, a Lisa para o quarto dela com\naquela expressão de mistura de felicidade e vou querer\ndetalhes amanhã — ficou só nós dois no ateliê com a luz\nbaixa e o castelo rangendo lá fora no vento.\nConversamos por um tempo que não controlei.\nSobre a avaliação de Magia Natural — que eu havia passado\ncom a palavra bom da professora Vael, que era a primeira vez\nem três anos que ela havia usado essa palavra em relação a\nqualquer estudante e que havia gerado um silêncio no ateliê\nque durou quatro segundos inteiros antes de alguém\nconseguir reagir. Sobre o plano de Ian para o semestre\nseguinte, sobre especialização que ele estava pensando em\nmudar, sobre aquela sensação específica de estar no meio de\nalguma coisa e não saber exatamente pra onde vai.\n— Como é saber que é bom em alguma coisa mas não saber\no que fazer com isso? — ele disse, em determinado momento.\n\n— Assustador — eu disse. — E também um pouco como o\nvento.\n— O vento?\n— Que não pertence a nenhum lugar. Que passa por tudo. —\nPausa. — Que escolhe o próprio caminho mesmo sem ter um\ndestino fixo.\nEle ficou quieto por um momento.\n— Eu nunca havia pensado nisso assim.\n— Eu penso nisso assim há anos.\n— E funciona?\n— Ainda estou testando.\nEle sorriu.\nE então ficou quieto de um jeito diferente — não o silêncio\nde quem está pensando, mas o de quem está prestando\natenção no que a situação está pedindo.\n— Serena — ele disse.\n— Hm.\n— Você tem um quarto.\n— Tenho.\n— E eu tenho um quarto.\n— Sei disso.\n\nPausa.\n— Não estou com pressa — ele disse. — Nunca estive. —\nOutra pausa, mais curta. — Mas eu quero estar onde você\nestá. Mesmo que seja só dormir.\nHavia algo naquilo que era a coisa mais direta e mais\nrespeitosa que ele havia dito — sem pressão, sem expectativa\nnão declarada, apenas presença pedindo permissão para\ncontinuar sendo presença.\nEu olhei pra ele por um segundo.\nE então me levantei, peguei o casaco, e disse:\n— Meu quarto tem uma janela que dá pro jardim das flores\nazuis.\nEle se levantou.\n— Isso é um convite?\n— Isso é uma descrição.\n— Serena.\n— Ian.\n— Está bem — ele disse, com aquele sorriso. — Vou\ninterpretar como as duas coisas.\n●\nMeu quarto de agora era diferente de antes\n\nNão havia mudado nada — a mesma cama que não era a\nminha desde o primeiro dia, as mesmas paredes de pedra que\ncheiravam ao castelo antigo, a mesma janela que dava pro\njardim encantado. Mas havia algo no jeito que o espaço se\norganizou naquela noite — com a luz baixa da vela que eu\nmantinha sempre acesa e o vento de dezembro fazendo as\npedras rangerem do lado de fora — que o tornava diferente\nde qualquer noite anterior.\nFicamos acordados por horas.\nNão de pressa. Do jeito que eu havia aprendido que as coisas\nque importam acontecem — devagar, com espaço suficiente\npara cada momento ser o que era antes do próximo chegar.\nConversamos sobre coisas que eu raramente contava pra\nqualquer pessoa.\nSobre o medo de escolher mal. Sobre a frase que eu carregava\n— eu não vou me arrepender de não ter tentado — e como\nàs vezes ela pesava mais do que deveria, porque tentativa nem\nsempre termina bem e saber disso antes de tentar era uma\ncarga particular.\n— Mas você tenta assim mesmo — ele disse.\n— Sempre — eu disse. — Porque a alternativa é pior.\n— Qual é a alternativa?\n— Chegar lá no fim e ter que responder pela não-tentativa. —\nPausa. — Isso é inaceitável pra mim.\nEle ficou quieto por um momento.\n— Eu quero ser um dos tentados — ele disse.\n\n— Você é — eu disse. — Faz tempo.\nHavia uma honestidade naquilo que eu não havia planejado.\nQue saiu da mesma forma que a mensagem de madrugada\nhavia saído — antes que o bom senso acordasse o suficiente\npara interferir.\nIan olhou pra mim por um segundo.\nE então disse, devagar, como quem coloca uma coisa no\nmundo pela primeira vez sabendo que não volta atrás:\n— Eu me apaixonei por você.\nNão foi declaração com fanfarra. Foi observação — do tipo\nque ele sempre fazia, com aquela atenção que eu havia\ncatalogado meses atrás como diferente.\nFicou quieto depois disso. Não esperou que eu respondesse\nimediatamente. Não transformou aquilo em pressão.\nApenas disse, e ficou.\nEu fiquei olhando pra ele por um momento.\nE então disse, com a honestidade de alguém que havia parado\nde se vigiar:\n— Eu sei.\nE pelas primeiras horas da madrugada mais longa do inverno,\nficamos ali — naquele quarto que finalmente tinha o cheiro\ncerto, com a janela que dava pro jardim encantado e o vento\nfazendo o castelo ranger do jeito familiar — apenas sendo o\nque éramos, sem pressa, sem a necessidade de provar nada\nalém do que já estava lá.\n\nAdormecemos abraçados.\nE quando acordei antes do sol, como sempre acordo, o jardim\ndo lado de fora estava coberto pela última neve encantada do\nSolstício.\nE havia, pousada na janela entreaberta, uma vespa pequena\nde luz âmbar que eu não havia convidado e que ficou ali por\nexatamente trinta segundos antes de ir embora.\nNão disse nada pra ele sobre isso quando acordou.\nMas escrevi no caderno de Magia Natural, com a letra de\nquem está anotando alguma coisa que não quer esquecer:\nFeitiços residuais se dissipam quando a intenção que os\ncriou se resolve.\nAlguns voltam."}, {"id": "cap13", "title": "O que a madrugada guarda", "text": "O que a madrugada guarda\nExistem coisas que você decide com o corpo inteiro.\nNão com a cabeça — a cabeça tem opiniões demais,\nconsiderações demais, aquela voz específica que lista as\nrazões pelas quais esperar é mais seguro. Não com o coração\n— o coração é impreciso, muda de intensidade a cada hora,\nnão é confiável como bússola para decisões que importam de\nverdade.\nCom o corpo inteiro. Com aquela certeza que começa no\ncentro e se espalha devagar, que não tem urgência nem\nansiedade, apenas clareza — a mesma clareza com que eu\nhavia entrado no trem que me trouxe pra Valdris, sabendo que\nestava indo pro lugar certo mesmo que o lugar certo tivesse\nmedo.\nEu decidi assim.\n●\nHavia neve lá fora.\nNão a neve encantada do Solstício — essa era outra, real, do\ntipo que a montanha produzia em janeiro sem consultarmos\nninguém. Neve de verdade tem um som próprio: ela não faz\nnada, mas o silêncio que cria ao redor é diferente de todos os\noutros silêncios. Mais completo. Mais honesto. Como se o\nmundo houvesse concordado, por algumas horas, em parar de\nexigir.\nEu estava no meu quarto.\n\nEra tarde — mais tarde do que o normal, o que já é dizer algo.\nA janela que dava pro jardim das flores azuis estava\nlevemente embaçada do frio de fora, e havia uma vela acesa\nna mesa que eu mantinha acesa desde que havia chegado à\nValdris porque havia algo no castelo de noite sem vela que\nera escuro demais para ser quieto, e escuro quieto eram duas\ncoisas diferentes.\nIan estava sentado na beira da cama, de costas pra janela, com\naquele jeito de preencher um espaço que havia aprendido que\nera específico dele — não tomando, não recuando, apenas\nestando.\nTínhamos conversado por horas antes disso.\nNão sobre isso, especificamente. Sobre tudo ao redor —\nsobre o semestre que havia terminado, sobre o que vinha\ndepois, sobre aquela sensação que o final de um ciclo tem de\nser simultaneamente alívio e perda. Sobre a fazenda, que eu\nhavia visitado na cabeça mais do que o normal naquela\nsemana, talvez porque o inverno aqui era diferente do inverno\nde lá e a diferença me lembrava da distância.\nSobre o Trovão, que segundo a última mensagem da minha\nmãe havia decidido que o muro do pasto era uma sugestão e\nnão uma regra.\nIan havia rido daquilo com aquela risada involuntária que eu\nhavia aprendido ser a mais verdadeira que ele tinha.\n●\nEm determinado momento o silêncio mudou.\n\nNão de repente. Silêncios não mudam de repente — mudam\ncomo maré, em gradações que você só percebe quando já está\nnum lugar diferente do que estava.\nEu estava do lado da janela, olhando pra neve que cobria o\njardim encantado, quando ele disse meu nome.\n— Serena.\nMe virei.\nEle estava me olhando com aquela expressão que eu havia\naprendido ser a versão mais honesta dele — não o sorriso de\nabertura, não a leveza de festa, mas a versão que ficava\nquando tudo o que não era essencial havia ido embora.\n— Você está bem? — ele disse.\nEra uma pergunta simples. Mas havia algo na forma como foi\nfeita — com toda aquela atenção que eu havia catalogado\ncomo diferente meses atrás — que era convite, não exigência.\n— Estou — eu disse.\nE então, antes que o bom senso acordasse o suficiente para\nfazer perguntas, acrescentei:\n— Mas tem uma coisa que eu preciso te dizer.\nEle esperou.\nSem pressa. Do jeito que sempre esperava.\n— Eu quero — eu disse. — Não porque seja a próxima coisa\nóbvia, não porque sinto que devo, não por nenhuma razão que\nvenha de fora de mim. — Pausa. — Eu quero porque você é\n\nvocê. E porque quando eu penso em não me arrepender —\nnessa frase que eu carrego desde que me entendo por gente\n— pensar em não ter tentado isso com você parece tão errado\nquanto teria sido não entrar naquele trem.\nIan ficou completamente quieto.\nNão o silêncio de quem está processando. O silêncio de quem\nestá ouvindo de verdade — todo o peso do que foi dito, sem\npressa de responder antes de ter recebido por inteiro.\nDepois ele disse:\n— Você tem certeza?\nNão foi dúvida. Foi a pergunta certa — a única pergunta que\nimportava, feita da única forma que não contamina a resposta.\n— Sim — eu disse. Com uma convicção que eu mesma senti\ncomo nova — não por falta de convicção antes, mas porque\nessa tinha uma qualidade diferente. Era feita de todos os\nmeses anteriores, de todos os corredores e conversas e\nsilêncios confortáveis. Era construída, não encontrada.\n— E você é a pessoa certa — eu acrescentei, porque era\nverdade e porque verdades desse tipo merecem ser ditas em\nvoz alta.\nEle me olhou por um segundo.\nE então disse, com aquela gentileza que era a característica\ndele que eu havia demorado mais para reconhecer porque não\nestava esperando encontrar nele:\n\n— Não há pressa. Esse quarto não vai a lugar nenhum. Eu\nnão vou a lugar nenhum. — Pausa. — Mas se for o que você\nquer, então é o que eu quero também.\n●\nO castelo rangeu lá fora, do jeito que rangía quando o vento\nbatia nas torres.\nA neve continuava caindo.\nA vela na mesa projetava aquela sombra longa na parede que\neu havia observado tantas noites — sozinha, antes, com\naquela solidão específica de quem está rodeada de pessoas\nque ainda não te conhecem de verdade.\nMas aquela noite o quarto não era solidão.\nEra o oposto de solidão.\nEra duas pessoas que haviam chegado até ali devagar, com\ncuidado, com a paciência de quem sabe que as coisas que\nimportam não aceitam pressa — e que agora estavam\nexatamente onde haviam escolhido estar, sem nenhuma\nurgência além da do presente.\n●\nNão vou descrever tudo. Algumas coisas pertencem ao\nsilêncio que as cria, e colocá-las em palavras seria como\ntentar descrever o cheiro da terra da fazenda para alguém que\nnunca esteve lá — você pode tentar, mas a experiência real é\nmaior do que o que a linguagem consegue conter.\nO que posso dizer é o que ficou.\n\nQue ele perguntou, mais de uma vez, se eu estava bem. Não\nde um jeito que interrompia — de um jeito que era parte do\nque estava acontecendo, integrado, como respiração.\nQue eu disse sim. Sempre sim.\nNão porque fosse o que se esperava. Porque era verdade.\nQue não houve dor.\nIsso me surpreendeu — não porque eu esperasse dor, mas\nporque havia na minha cabeça alguma expectativa de que um\nprimeiro qualquer coisa incluía algum tipo de custo de\nentrada. Uma desconfortabilidade, um ajuste, algo que\nprecisasse ser superado.\nNão havia nada assim.\nHavia apenas aquela clareza que eu havia descrito antes —\ndo corpo inteiro, sem urgência, sem ansiedade. Como quando\nvocê encontra o ritmo certo de uma coisa que você nunca\nhavia feito antes mas que de alguma forma você reconhece.\nComo liberdade.\n●\nFicamos acordados até tarde.\nNão falando muito — a noite havia criado aquele tipo de\nquietude onde as palavras não são necessárias porque tudo\nque importava já havia sido dito, de formas diferentes, ao\nlongo de muitos meses.\nMas em determinado momento, com a neve ainda caindo lá\nfora e a vela quase no fim, ele disse baixinho:\n\n— Como você está?\nE eu soube que não era pergunta de protocolo. Era a mesma\natenção de sempre — o mesmo homem que havia carregado\numa muleta escada acima sem ser pedido, que havia usado o\nvento da fazenda numa magia porque era a melhor referência\nque tinha, que havia dito eu escolhi com a consciência de\nquem sabe o que está escolhendo.\n— Bem — eu disse. — De verdade.\nPausa.\n— Mais do que bem.\nEle ficou quieto, mas eu senti no jeito que o abraço mudou\nlevemente — ficou mais completo, do tipo que acontece\nquando alguém que estava segurando algo com cuidado\nfinalmente sente que pode pousar.\n— Ian — eu disse.\n— Hm.\n— Obrigada por ter perguntado.\n— Por ter perguntado o quê?\n— Se eu tinha certeza.\nEle ficou quieto.\n●\nAdormeci com a neve do lado de fora e a vela apagando\nsozinha, como apagava sempre quando chegava ao fim —\n\nnão de uma vez, mas em gradações, até que o quarto ficava\nnaquele escuro específico que não era ausência de luz mas\nsim outra qualidade de presença.\nNo caderno de Magia Natural, que ficava aberto na mesa\ndesde a noite do Solstício, havia uma linha que eu havia\nescrito semanas antes:\nRessonância Passiva: perceber sem interferir. Ressonância\nExpansiva: usar o que você percebeu para criar espaço.\nNaquela manhã, quando acordei antes do sol como sempre\nacordo, acrescentei uma terceira:\nConvergência: o que acontece quando dois elementos com\nafinidade natural existem no mesmo espaço por tempo\nsuficiente.\nNão é destino. É física.\nÉ escolha."}, {"id": "cap14", "title": "O homem da faca afiada", "text": "O homem da faca afiada\nA minha mãe me ligou numa manhã de fevereiro com o tom\nde quem tem uma notícia e está decidindo como embrulhá-la.\nConheço esse tom desde criança. É o tom que precede coisas\ncomo estamos pensando em pintar a sala e seu pai falou em\nvir te visitar, que são coisas diferentes em tamanho mas que\ncompartilham a característica de chegarem embrulhadas em\ncautela desnecessária porque minha mãe sabe que eu\nprocesso melhor as coisas quando tenho tempo de processar.\n— Seu pai quer vir — ela disse.\n— A Valdris? — eu disse.\n— Há um torneio de inverno que vai acontecer em março —\nela disse. — Ele leu sobre o evento no boletim da academia.\nQuer ver como é o lugar onde você está.\nFicou um silêncio.\n— Ele nunca viajou pra cá — eu disse.\n— Nunca precisou. Agora quer.\nHavia algo naquilo que eu entendi imediatamente sem\nprecisar que ela explicasse. Meu pai não era homem de\nvisitas. Era homem de fazenda, de presença física no lugar\nonde as coisas precisavam ser feitas. Viajar pra Valdris não\nera programa de fim de semana para ele — era decisão, que\nera diferente.\nE decisões do meu pai tinham peso específico.\n\n— Ele sabe? — eu disse. — Sobre o Ian?\nPausa da minha mãe.\n— Eu posso ter mencionado — ela disse, com aquela\ninocência que é o oposto de inocência.\n●\nContei para Ian naquela mesma tarde.\nEle recebeu a informação com a serenidade de alguém que\nhavia prometido que quando eu estivesse pronta ele estaria\ntambém — e que claramente havia esquecido, naquele\nmomento de promessa, de calcular o que isso significava na\nprática quando o pai em questão era o meu pai.\n— O seu pai — ele disse.\n— O próprio.\n— O que você descreveu como assustador no primeiro\nimpacto.\n— E completamente diferente do que parece depois de\nconhecer.\n— Você disse as duas coisas na mesma frase.\n— Porque as duas são verdade.\nIan ficou quieto por um segundo, com aquela expressão que\neu havia aprendido ser a versão dele de estou processando a\ninformação e tentando não demonstrar que estou levemente\nnervoso.\n\nEle estava levemente nervoso.\nEu achei isso mais reconfortante do que deveria.\n— Ele vai me assustar — Ian disse.\n— Provavelmente.\n— Isso ainda é aviso e promessa?\n— Ainda é.\nEle assentiu, com a seriedade tranquila de quem havia\naceitado um desafio real meses atrás e não estava com\nintenção de recuar agora.\n— Quando chegam? — ele disse.\n— Em três semanas.\n— Três semanas — ele repetiu.\n— É tempo suficiente.\n— Pra quê?\n— Pra você parar de fazer essa expressão.\nEle olhou pra mim.\n— Qual expressão?\n— A de quem está fazendo cálculo mental de sobrevivência.\nEle riu — aquela risada involuntária que chegava antes da\ndecisão. E havia algo naquilo que me tranquilizou de um jeito\nque eu não havia esperado precisar.\n\n●\nMeus pais chegaram numa quinta-feira de março, pelo trem\ndo sul que parava na estação de Valdris Baixa às três da tarde.\nEu estava na plataforma quando o trem chegou.\nNão havia planejado estar com nervosismo visível — havia\nplanejado estar tranquila, adulta, a versão de mim que\nescolhera a Valdris e havia ficado e havia construído alguma\ncoisa aqui que era sua. Mas quando as portas do trem abriram\ne eu vi a minha mãe primeiro — linda do jeito que sempre é,\ncom aquele jeito que me lembra quem eu serei em vinte anos\n— e depois o meu pai atrás dela, com aquela presença que\nocupa espaço de um modo que eu reconheço em mim como\nreconheço o meu próprio reflexo —\nAlgo em mim simplesmente abriu.\nSem aviso. Como portão de fazenda que range do jeito certo.\nCorri, que é uma coisa que raramente faço, e abracei a minha\nmãe com uma força que surpreendeu as duas, e depois fiquei\nparada por um segundo na frente do meu pai que não chorava\nmas que tinha os olhos de alguém que estava se esforçando\npara não chorar, e ele me puxou num abraço que cheirava a\ncasa e a fazenda e a tudo que ficava a muitas horas dali.\n— Você está bem — ele disse. Não pergunta. Verificação.\n— Estou — eu disse.\n— Pareço estar.\n— Eu sei que você ia estar.\n\nHavia algo naquilo que era inteiramente meu pai: não a\npreocupação de quem duvida, mas a certeza de quem sempre\nsoube e que estava confirmando de perto porque queria ver\ncom os próprios olhos.\n●\nPassei o primeiro dia mostrando a Valdris para eles.\nNão toda — o castelo não era lugar que se mostrava de uma\nvez, e meu pai não era homem que precisava de tour completo\npara formar opinião. Mostrei o que importava: o ateliê de\nMagia Natural, que ele examinou com a mesma atenção com\nque examinava qualquer trabalho bem feito — passando a\nmão nas bancadas, verificando os frascos de espécimes, lendo\nos rótulos com uma concentração que me fez perceber de\nonde havia herdado o hábito de ler tudo antes de concluir\nqualquer coisa.\n— Você gosta daqui — ele disse, no ateliê.\n— Gosto — eu disse.\n— Dá pra ver — ele disse. E havia naquilo o mesmo peso de\nquando a professora Vael havia dito bom — não elogio por\nelogio, mas reconhecimento genuíno de alguém que só fala\nquando tem algo real a dizer.\nMostrei a biblioteca — o Theo havia insistido em nos guiar\npelo quarto andar, o que resultou numa experiência que\nminha mãe descreveu como encantadora e que meu pai\ndescreveu como estrutura interessante enquanto observava\nas prateleiras se moverem com a expressão de quem estava\ncalculando a engenharia envolvida.\n\nMostrei o campo aberto atrás das torres sul — onde o\nConfronto havia acontecido, onde o vento chegava do leste\nsem pedir permissão, onde Ian havia feito aquela magia com\no ar que havia parecido minha.\nMinha mãe olhou pro campo e disse:\n— Você parece diferente aqui.\n— Como assim? — eu disse.\n— Mais inteira — ela disse, com aquela precisão de mãe que\nultrapassa qualquer explicação que você tente dar depois.\n●\nIan chegou para o jantar.\nEu havia organizado um jantar pequeno no salão de\nconvivência da ala norte — não cerimônia formal, não\napresentação oficial, apenas comida e espaço para que dois\nmundos que existiam em paralelo dentro de mim finalmente\nse encontrassem no mesmo lugar ao mesmo tempo.\nEstava nervosa de um jeito que não havia esperado. Não por\nIan — havia visto ele nervoso durante as três semanas de\nespera, havia assistido ele fazer aquela expressão de cálculo\nde sobrevivência mais vezes do que eu iria admitir em voz\nalta, e havia algo naquele nervosismo dele que havia me\nacalmado de uma forma que me fez perceber o quanto eu\nhavia crescido em confiança nele nos últimos meses.\nEstava nervosa pelo meu pai.\nNão porque eu duvidasse de Ian. Mas porque o julgamento\ndo meu pai sobre pessoas era preciso da forma que\n\njulgamentos construídos em anos de trabalho são precisos —\nele não se impressionava com aparência ou com conversa\nfácil. Ele olhava para alguma coisa mais fundamental: se a\npessoa era real, se tinha caráter, se havia construído alguma\ncoisa com as próprias mãos.\nIan havia construído. De um jeito diferente da fazenda, mas\nhavia.\nEu sabia disso.\nQueria que meu pai visse.\n●\nO problema foi que o meu pai decidiu, com aquele senso de\nhumor que é idêntico ao meu, que a situação pedia teatrinho.\nIan chegou pontualmente — o que eu soube depois que havia\ncustado a ele vinte minutos a mais do horário habitual parado\nno corredor do lado de fora tentando decidir qual versão de si\nmesmo era a mais adequada, decisão que o Theo havia\ndescrito como desnecessária e que a Lisa havia descrito como\nhumana e previsível.\nMeu pai estava sentado à mesa quando Ian entrou.\nE na mão do meu pai havia uma faca.\nNão uma faca de cozinha comum — uma faca de fazer que a\nminha família usava na fazenda para trabalho real, que meu\npai carregava às vezes quando viajava do mesmo jeito que\ncarregava qualquer ferramenta que lhe pertencia. E ele estava\nafiando aquela faca na pedra com uma calma que era,\nobjetivamente, calculada.\n\nIan parou na entrada do salão.\nOlhou pra faca.\nOlhou pro meu pai.\nMeu pai levantou os olhos devagar, com aquela expressão\nque eu conhecia como a versão dele de estou avaliando, e\ndisse:\n— Você é o Ian.\n— Sou — disse Ian, com uma estabilidade vocal que eu achei\nadmirável nas circunstâncias.\n— Sente — disse meu pai.\nIan sentou.\nMeu pai continuou afiando a faca por aproximadamente trinta\nsegundos mais — trinta segundos que eu imagino terem\nparecido consideravelmente mais longos para Ian do que para\nqualquer outra pessoa na sala — e então pousou a pedra e a\nfaca na mesa com a tranquilidade de quem havia concluído\numa tarefa rotineira.\n— Minha filha fala de você — disse meu pai.\n— Ela fala do senhor também — disse Ian.\n— O quê ela fala?\nUma pausa mínima.\n— Que o senhor construiu tudo que tem com as próprias mãos\n— disse Ian. — E que ela reconhece isso nela mesma.\n\nMeu pai ficou olhando pra ele por um segundo.\nE então algo mudou na expressão dele — não muito, não de\num jeito visível para quem não o conhecesse. Mas eu o\nconhecia.\nEra reconhecimento.\n●\nMas o teatro ainda não havia terminado.\nPorque o meu pai, satisfeito com a resposta mas claramente\nnão com a quantidade de desconforto produzida, olhou pra\nIan com uma expressão nova — e então ergueu a mão direita\ne deixou que um fio de luz vermelha se formasse entre os\ndedos, denso e pulsando como brasa.\nEu conhecia aquele feitiço.\nMagia de Fogo Controlada — a especialização do meu pai,\naprendida na escola pequena da cidade onde havia crescido e\naperfeiçoada em décadas de trabalho com forja e ferro na\nfazenda. Ele não a usava frequentemente. Mas quando usava,\nera com a precisão de alguém que havia passado anos\nentendendo que fogo obedecia intenção antes de obedecer\ntécnica.\n— Na fazenda — disse meu pai, com aquela voz calma —\nquando alguém quer trabalhar comigo, eu testo antes.\nIan olhou pro fio de fogo.\nDepois olhou pro meu pai.\n— Como o senhor testa? — disse Ian.\n\n— A gente vê — disse meu pai. — Se a pessoa fica parada\ncom medo, eu sei que não aguenta a dureza. — Pausa. — Se\na pessoa recua, eu sei que não tem convicção. — Outra pausa.\n— Se a pessoa responde na altura, aí eu sei que pode ficar.\nIan ficou quieto por um segundo.\nE então, com aquela fluidez que eu havia visto no circuito de\nMovimentação e no campo do Confronto e na escada estreita\ndo quarto andar, ficou de pé.\nNão com urgência. Com aquela qualidade de movimento que\nsó existia quando alguém estava fazendo exatamente o que\nhavia decidido.\nE deixou que a Magia de Movimento se formasse ao redor\ndas mãos — não como fogo, não como vento, mas como\naquela coisa mais sutil que eu havia visto no Confronto: a\norganização do espaço ao redor, o ar se tornando algo mais\nestruturado, o tipo de magia que não precisava de espetáculo\npara ser real.\nMeu pai olhou para aquilo.\nPor um segundo — apenas um — a expressão dele mudou do\njeito que expressões mudam quando você encontra alguma\ncoisa que não esperava e que reconhece como boa.\n— Magia de Movimento — disse meu pai.\n— Sim, senhor.\n— Eu nunca aprendi Movimento — disse meu pai. — Era\ncaro demais na escola onde estudei.\n— Eu sei que não é fácil de acessar — disse Ian.\n\n— Como você aprendeu?\n— Bolsa de desempenho — disse Ian. — Entrei num torneio\nregional no primeiro ano e ganhei cobertu
