const IMAGE_CAPTIONS = [
  "Momentos que cabem numa foto, mas que pesam o suficiente para encher páginas.",
  "Às vezes a felicidade tem cara — e a dessa noite eu não vou esquecer.",
  "Um segundo guardado para sempre."
];

// ==================== STATE ====================
let currentChapterIdx = 0;
const SAVED_KEY = 'amqpav_bookmark';

function getSavedChapter() {
  try { return parseInt(localStorage.getItem(SAVED_KEY)) || 0; } catch { return 0; }
}
function saveChapter(idx) {
  try { localStorage.setItem(SAVED_KEY, idx); } catch {}
}

// ==================== SCREENS ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goToIndex() {
  buildIndex();
  showScreen('screen-index');
}

// ==================== COVER ====================
function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const stars = Array.from({length: 160}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.4 + 0.2,
    a: Math.random(),
    speed: Math.random() * 0.004 + 0.001,
    phase: Math.random() * Math.PI * 2
  }));

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const t = Date.now() * 0.001;
    stars.forEach(s => {
      const alpha = 0.25 + 0.55 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(201,168,76,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();

  setTimeout(() => {
    document.getElementById('cover-inner').classList.add('visible');
  }, 200);
}

// ==================== INDEX ====================
function buildIndex() {
  const list = document.getElementById('tab-chapters');
  list.innerHTML = '';

  const savedIdx = getSavedChapter();

  const frontMatter = ['dedicatoria','epigrafe','prefacio'];
  const backMatter = ['agradecimentos','nota'];

  CHAPTERS.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'chapter-item fade-in';
    item.style.animationDelay = (i * 0.04) + 's';

    let numLabel = '';
    if (frontMatter.includes(ch.id)) numLabel = '–';
    else if (backMatter.includes(ch.id)) numLabel = '–';
    else {
      const capNum = i - 2; // after dedicatoria, epigrafe, prefacio
      numLabel = String(capNum).padStart(2,'0');
    }

    const isSaved = (i === savedIdx) && savedIdx > 0;

    item.innerHTML = `
      <span class="ch-num">${numLabel}</span>
      <span class="ch-title">${ch.title}</span>
      ${isSaved ? '<span class="ch-badge">● Continuar</span>' : ''}
    `;
    item.onclick = () => openChapter(i);
    list.appendChild(item);
  });

  // Gallery
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '';
  IMAGES.forEach((src, i) => {
    const div = document.createElement('div');
    div.className = 'gallery-photo';
    div.innerHTML = `<img src="${src}" alt="Foto ${i+1}" loading="lazy">`;
    div.onclick = () => openLightbox(src);
    grid.appendChild(div);
  });
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-chapters').classList.toggle('hidden', tab === 'gallery');
  document.getElementById('tab-gallery').classList.toggle('active', tab === 'gallery');
}

// ==================== READER ====================
function openChapter(idx) {
  currentChapterIdx = idx;
  saveChapter(idx);
  renderChapter(idx);
  showScreen('screen-reader');
}

function renderChapter(idx) {
  const ch = CHAPTERS[idx];
  if (!ch) return;

  // Eyebrow
  const frontMatter = ['dedicatoria','epigrafe','prefacio'];
  const backMatter = ['agradecimentos','nota'];
  let eyebrow = '';
  if (!frontMatter.includes(ch.id) && !backMatter.includes(ch.id)) {
    const capNum = idx - 2;
    eyebrow = `Capítulo ${capNum}`;
  }

  document.getElementById('chapter-eyebrow').textContent = eyebrow;
  document.getElementById('chapter-title').textContent = ch.title;
  document.getElementById('reader-topbar-title').textContent = ch.title;

  // Render body
  const body = document.getElementById('reader-body');
  const paragraphs = ch.text.split(/\n\n+/);
  body.innerHTML = paragraphs.map(p => {
    p = p.trim();
    if (!p) return '';
    // Section break markers
    if (p === '•' || p === '●' || p === '* * *') {
      return '<p class="section-break">— ✦ —</p>';
    }
    // Dialogue lines (start with —)
    const cls = p.startsWith('—') ? ' class="dialogue"' : '';
    return `<p${cls}>${p.replace(/\n/g,' ')}</p>`;
  }).join('');

  // Progress
  const pct = ((idx+1) / CHAPTERS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Nav state
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === CHAPTERS.length - 1;
  document.getElementById('nav-center').textContent = `${idx + 1} de ${CHAPTERS.length}`;

  window.scrollTo(0,0);
}

function navigate(dir) {
  const next = currentChapterIdx + dir;
  if (next < 0 || next >= CHAPTERS.length) return;
  openChapter(next);
}

// Track scroll progress
document.addEventListener('scroll', () => {
  if (!document.getElementById('screen-reader').classList.contains('active')) return;
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const base = ((currentChapterIdx+1) / CHAPTERS.length) * 100;
  const chunkSize = 100 / CHAPTERS.length;
  const scrollPct = docHeight > 0 ? (scrollTop / docHeight) * chunkSize : 0;
  const pct = Math.min(((currentChapterIdx / CHAPTERS.length) * 100) + scrollPct, 100);
  document.getElementById('progress-fill').style.width = pct + '%';
});

// ==================== LIGHTBOX ====================
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => {
  initStars();
  buildIndex();
});
</script>
